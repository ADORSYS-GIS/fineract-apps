version: "3.8"
services:
  # asset-service:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   ports:
  #     - "8083:8083"
  #   environment:
  #     SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/asset_service
  #     SPRING_DATASOURCE_USERNAME: asset_service
  #     SPRING_DATASOURCE_PASSWORD: password
  #     REDIS_HOST: redis
  #     REDIS_PORT: 6379
  #     FINERACT_URL: https://localhost
  #     FINERACT_TENANT: default
  #     FINERACT_AUTH_TYPE: basic
  #     FINERACT_USERNAME: mifos
  #     FINERACT_PASSWORD: password
  #     KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/fineract
  #     KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/fineract/protocol/openid-connect/certs
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: asset_service
      POSTGRES_USER: asset_service
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asset_service"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/fineract-assets;
      mc anonymous set download local/fineract-assets;
      "

volumes:
  postgres_data:
  redis_data:
  minio_data:
