version: "3.8"
services:
  asset-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    networks:
      default: {}
      fineract-gitops:
        aliases:
          - asset-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/asset_service
      SPRING_DATASOURCE_USERNAME: asset_service
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      FINERACT_URL: https://host.docker.internal:8443
      FINERACT_TENANT: default
      FINERACT_AUTH_TYPE: oauth
      FINERACT_CLIENT_ID: asset-service
      FINERACT_CLIENT_SECRET: asset-service-secret
      FINERACT_USERNAME: mifos
      FINERACT_PASSWORD: password
      FINERACT_TOKEN_URL: http://host.docker.internal:8180/realms/fineract/protocol/openid-connect/token
      KEYCLOAK_ISSUER_URI: http://host.docker.internal:8180/realms/fineract
      KEYCLOAK_JWK_SET_URI: http://host.docker.internal:8180/realms/fineract/protocol/openid-connect/certs
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_PUBLIC_BASE_URL: http://localhost:9000/fineract-assets
      APP_SECURITY_PERMIT_ALL_ADMIN: "true"
      RATE_LIMIT_ENABLED: "false"
      APP_CORS_ALLOWED_ORIGINS: "http://localhost:8080,http://localhost:4209,http://localhost:3000,http://localhost:5173"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  asset-manager:
    build:
      context: ../..
      dockerfile: frontend/asset-manager-app/Dockerfile
    ports:
      - "3083:80"
    networks:
      default: {}
      fineract-gitops:
        aliases:
          - asset-manager-app
    depends_on:
      - asset-service

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: asset_service
      POSTGRES_USER: asset_service
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asset_service"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/fineract-assets;
      mc anonymous set download local/fineract-assets;
      "

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  default: {}
  fineract-gitops:
    external: true
    name: fineract-gitops_fineract-net
