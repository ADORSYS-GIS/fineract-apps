server:
  port: 8083
  servlet:
    context-path: /api/v1

spring:
  application:
    name: asset-service

  # Virtual threads (Java 21) — prevents thread exhaustion from blocking FineractClient calls
  threads:
    virtual:
      enabled: true

  # Multipart file upload
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

  # Database configuration
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/asset_service}
    username: ${SPRING_DATASOURCE_USERNAME:asset_service}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    hikari:
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:5}
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:20}
      idle-timeout: 30000
      max-lifetime: 600000
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:10000}
      leak-detection-threshold: ${SPRING_DATASOURCE_HIKARI_LEAK_DETECTION_THRESHOLD:60000}

  # JPA configuration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  # Flyway migrations
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  # Redis configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/fineract}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8080/realms/fineract/protocol/openid-connect/certs}

# Application Configuration
app:
  fineract:
    ssl-verify: ${FINERACT_SSL_VERIFY:false}  # Only disable in dev; defaults to true in WebClientConfig

# Fineract Configuration
fineract:
  url: ${FINERACT_URL:https://localhost}
  tenant: ${FINERACT_TENANT:default}
  auth-type: ${FINERACT_AUTH_TYPE:basic}
  token-url: ${FINERACT_TOKEN_URL:http://keycloak:8080/realms/fineract/protocol/openid-connect/token}
  client-id: ${FINERACT_CLIENT_ID:fineract-service}
  client-secret: ${FINERACT_CLIENT_SECRET:}
  username: ${FINERACT_USERNAME:mifos}
  password: ${FINERACT_PASSWORD:password}
  timeout-seconds: 30

# Asset Service Configuration
asset-service:
  settlement-currency: ${SETTLEMENT_CURRENCY:XAF}
  market-hours:
    open: "08:00"
    close: "20:00"
    timezone: "Africa/Douala"
    weekend-trading-enabled: false
  pricing:
    snapshot-cron: "0 0 * * * *"
    max-change-percent: 50
  orders:
    stale-cleanup-minutes: 30
  trade-lock:
    ttl-seconds: 45
    local-fallback-timeout-seconds: 40
  accounting:
    spread-collection-account-id: ${SPREAD_COLLECTION_ACCOUNT_ID:1}
    fee-collection-account-external-id: ${FEE_COLLECTION_ACCOUNT_EXTERNAL_ID:PLATFORM-FEE-COLLECT}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    trade-limit: ${RATE_LIMIT_TRADE:10}
    trade-duration-minutes: ${RATE_LIMIT_TRADE_DURATION:1}
    general-limit: ${RATE_LIMIT_GENERAL:100}
    general-duration-minutes: ${RATE_LIMIT_GENERAL_DURATION:1}
  gl-accounts:
    digital-asset-inventory: ${GL_DIGITAL_ASSET_INVENTORY:47}
    customer-digital-asset-holdings: ${GL_CUSTOMER_DIGITAL_ASSET_HOLDINGS:65}
    transfers-in-suspense: ${GL_TRANSFERS_IN_SUSPENSE:131}
    income-from-interest: ${GL_INCOME_FROM_INTEREST:87}
    expense-account: ${GL_EXPENSE_ACCOUNT:91}
    asset-issuance-payment-type: ${ASSET_ISSUANCE_PAYMENT_TYPE:Asset Issuance}
    fund-source: ${GL_FUND_SOURCE:42}
    asset-equity: ${GL_ASSET_EQUITY:73}
    platform-fee-income: ${GL_PLATFORM_FEE_INCOME:88}
    spread-income: ${GL_SPREAD_INCOME:89}
    tax-expense-reg-duty: ${GL_TAX_EXPENSE_REG_DUTY:92}
    tax-expense-cap-gains: ${GL_TAX_EXPENSE_CAP_GAINS:93}
    tax-expense-ircm: ${GL_TAX_EXPENSE_IRCM:94}
  quote:
    ttl-seconds: ${QUOTE_TTL_SECONDS:30}
    max-active-per-user: ${QUOTE_MAX_ACTIVE_PER_USER:5}
    expiry-cleanup-interval-ms: ${QUOTE_EXPIRY_CLEANUP_INTERVAL_MS:10000}
  archival:
    retention-months: ${ARCHIVAL_RETENTION_MONTHS:12}
    batch-size: ${ARCHIVAL_BATCH_SIZE:1000}
  portfolio:
    snapshot-cron: "0 30 20 * * *"

# File Storage (S3/MinIO)
storage:
  bucket: ${STORAGE_BUCKET:fineract-assets}
  region: ${STORAGE_REGION:us-east-1}
  endpoint: ${STORAGE_ENDPOINT:http://localhost:9000}
  access-key: ${STORAGE_ACCESS_KEY:minioadmin}
  secret-key: ${STORAGE_SECRET_KEY:minioadmin}
  public-base-url: ${STORAGE_PUBLIC_BASE_URL:http://localhost:9000/fineract-assets}
  max-file-size: ${STORAGE_MAX_FILE_SIZE:5242880}
  allowed-content-types: image/jpeg,image/png,image/webp,image/svg+xml

# Resilience4j Circuit Breaker
resilience4j:
  circuitbreaker:
    instances:
      fineract:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        recordExceptions:
          - com.adorsys.fineract.asset.exception.AssetException
          - org.springframework.web.reactive.function.client.WebClientResponseException
  retry:
    instances:
      fineract:
        maxAttempts: 3
        waitDuration: 500ms
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - org.springframework.web.reactive.function.client.WebClientResponseException$ServiceUnavailable
          - org.springframework.web.reactive.function.client.WebClientResponseException$GatewayTimeout
          - java.util.concurrent.TimeoutException
  timelimiter:
    instances:
      fineract:
        timeoutDuration: 30s

# Actuator Configuration
management:
  server:
    port: 8084
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,threaddump,heapdump
  info:
    git:
      mode: simple
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
    heapdump:
      enabled: ${MANAGEMENT_ENDPOINT_HEAPDUMP_ENABLED:true}
    threaddump:
      enabled: ${MANAGEMENT_ENDPOINT_THREADDUMP_ENABLED:true}
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    enabled: ${MANAGEMENT_TRACING_ENABLED:true}
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}

# Logging Configuration
logging:
  level:
    root: INFO
    com.adorsys.fineract.asset: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"

# OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

---
# Kubernetes Profile
spring:
  config:
    activate:
      on-profile: kubernetes

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak.fineract.svc.cluster.local:8080/realms/fineract
          jwk-set-uri: http://keycloak.fineract.svc.cluster.local:8080/realms/fineract/protocol/openid-connect/certs

  data:
    redis:
      host: redis.fineract.svc.cluster.local

fineract:
  url: http://fineract.fineract.svc.cluster.local:8443/fineract-provider
  token-url: http://keycloak.fineract.svc.cluster.local:8080/realms/fineract/protocol/openid-connect/token

storage:
  endpoint: ${STORAGE_ENDPOINT:}
  access-key: ${STORAGE_ACCESS_KEY:}
  secret-key: ${STORAGE_SECRET_KEY:}
  public-base-url: ${STORAGE_PUBLIC_BASE_URL:}

logging:
  level:
    root: INFO
    com.adorsys.fineract.asset: INFO

# Enable OTLP tracing
management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4318/v1/traces}
