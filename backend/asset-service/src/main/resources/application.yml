server:
  port: 8083
  servlet:
    context-path: /api/v1
  forward-headers-strategy: FRAMEWORK

spring:
  application:
    name: asset-service

  # Virtual threads (Java 21) — prevents thread exhaustion from blocking FineractClient calls
  threads:
    virtual:
      enabled: true

  # Multipart file upload
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

  # Database configuration
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/asset_service}
    username: ${SPRING_DATASOURCE_USERNAME:asset_service}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    hikari:
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:5}
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:20}
      idle-timeout: 30000
      max-lifetime: 600000
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:10000}
      leak-detection-threshold: ${SPRING_DATASOURCE_HIKARI_LEAK_DETECTION_THRESHOLD:60000}

  # JPA configuration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  # Flyway migrations
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true

  # Redis configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          enabled: true   # REQUIRED: without this flag Lettuce ignores all pool size settings
          max-active: ${SPRING_DATA_REDIS_LETTUCE_POOL_MAX_ACTIVE:10}
          max-idle: ${SPRING_DATA_REDIS_LETTUCE_POOL_MAX_IDLE:5}
          min-idle: ${SPRING_DATA_REDIS_LETTUCE_POOL_MIN_IDLE:1}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/fineract}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8080/realms/fineract/protocol/openid-connect/certs}

# Application Configuration
app:
  fineract:
    ssl-verify: ${FINERACT_SSL_VERIFY:false}  # Only disable in dev; defaults to true in WebClientConfig
  notifications:
    excluded-alert-types: RECONCILIATION_CRITICAL

# Fineract Configuration
fineract:
  url: ${FINERACT_URL:https://localhost}
  tenant: ${FINERACT_TENANT:default}
  auth-type: ${FINERACT_AUTH_TYPE:basic}
  token-url: ${FINERACT_TOKEN_URL:http://keycloak:8080/realms/fineract/protocol/openid-connect/token}
  client-id: ${FINERACT_CLIENT_ID:fineract-service}
  client-secret: ${FINERACT_CLIENT_SECRET:}
  username: ${FINERACT_USERNAME:}
  password: ${FINERACT_PASSWORD:}
  timeout-seconds: 30

# Asset Service Configuration
asset-service:
  settlement-currency: ${SETTLEMENT_CURRENCY:XAF}
  market-hours:
    open: "08:00"
    close: "20:00"
    timezone: "Africa/Douala"
    weekend-trading-enabled: false
  pricing:
    snapshot-cron: "0 0 * * * *"
    max-change-percent: 50
  orders:
    stale-cleanup-minutes: 30
  trade-lock:
    ttl-seconds: 45
    local-fallback-timeout-seconds: 40
  accounting:
    spread-collection-account-id: ${SPREAD_COLLECTION_ACCOUNT_ID:1}
    fee-collection-account-external-id: ${FEE_COLLECTION_ACCOUNT_EXTERNAL_ID:PLATFORM-FEE-COLLECT}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    trade-limit: ${RATE_LIMIT_TRADE:10}
    trade-duration-minutes: ${RATE_LIMIT_TRADE_DURATION:1}
    general-limit: ${RATE_LIMIT_GENERAL:100}
    general-duration-minutes: ${RATE_LIMIT_GENERAL_DURATION:1}
  settlement-currency-product-short-name: ${SETTLEMENT_CURRENCY_PRODUCT_SHORT_NAME:VSAV}
  lp-settlement-product-short-name: ${LP_SAVINGS_PRODUCT_SHORT_NAME:LSAV}
  lp-spread-product-short-name: ${LP_SPREAD_PRODUCT_SHORT_NAME:LSPD}
  lp-tax-product-short-name: ${LP_TAX_PRODUCT_SHORT_NAME:LTAX}
  gl-accounts:
    # Client GL accounts
    fund-source: ${GL_FUND_SOURCE:502}
    savings-control: ${GL_SAVINGS_CONTROL:4101}
    customer-digital-asset-holdings: ${GL_CUSTOMER_DIGITAL_ASSET_HOLDINGS:4102}
    # LP GL accounts
    lp-settlement-control: ${GL_LP_SAVINGS_CONTROL:4011}
    lp-spread-payable: ${GL_LP_SPREAD_PAYABLE:4012}
    lp-tax-withholding: ${GL_LP_TAX_WITHHOLDING:4013}
    lp-fund-source: ${GL_LP_FUND_SOURCE:5011}
    # Trust accounts
    mtn-mo-mo: ${GL_MTN_MOMO:5001}
    orange-money: ${GL_ORANGE_MONEY:5002}
    uba-bank: ${GL_UBA_BANK:5011}
    afriland-bank: ${GL_AFRILAND_BANK:5012}
    # Inventory & suspense
    digital-asset-inventory: ${GL_DIGITAL_ASSET_INVENTORY:301}
    transfers-in-suspense: ${GL_TRANSFERS_IN_SUSPENSE:4501}
    # Fee/spread payable (for revenue recognition)
    platform-fee-payable: ${GL_PLATFORM_FEE_PAYABLE:4201}
    # Income
    platform-fee-income: ${GL_PLATFORM_FEE_INCOME:701}
    income-from-interest: ${GL_INCOME_FROM_INTEREST:701}
    fee-income: ${GL_FEE_INCOME:701}
    # Expense
    expense-account: ${GL_EXPENSE_ACCOUNT:601}
    tax-expense-reg-duty: ${GL_TAX_EXPENSE_REG_DUTY:603}
    tax-expense-cap-gains: ${GL_TAX_EXPENSE_CAP_GAINS:604}
    tax-expense-ircm: ${GL_TAX_EXPENSE_IRCM:608}
    tax-expense-tva: ${GL_TAX_EXPENSE_TVA:608}
    # Equity
    asset-equity: ${GL_ASSET_EQUITY:103}
    # Tax payable
    tax-payable-fund-source: ${GL_TAX_PAYABLE_FUND_SOURCE:5031}
    # Payment types
    asset-issuance-payment-type: ${ASSET_ISSUANCE_PAYMENT_TYPE:Asset Issuance}
    buy-payment-type: ${BUY_PAYMENT_TYPE:Asset Purchase}
    sell-payment-type: ${SELL_PAYMENT_TYPE:Asset Sale}
  quote:
    ttl-seconds: ${QUOTE_TTL_SECONDS:30}
    max-active-per-user: ${QUOTE_MAX_ACTIVE_PER_USER:5}
    expiry-cleanup-interval-ms: ${QUOTE_EXPIRY_CLEANUP_INTERVAL_MS:10000}
  archival:
    retention-months: ${ARCHIVAL_RETENTION_MONTHS:12}
    batch-size: ${ARCHIVAL_BATCH_SIZE:1000}
  portfolio:
    snapshot-cron: "0 30 20 * * *"

# File Storage (S3/MinIO)
storage:
  bucket: ${STORAGE_BUCKET:fineract-assets}
  region: ${STORAGE_REGION:us-east-1}
  endpoint: ${STORAGE_ENDPOINT:http://localhost:9000}
  access-key: ${STORAGE_ACCESS_KEY:}
  secret-key: ${STORAGE_SECRET_KEY:}
  public-base-url: ${STORAGE_PUBLIC_BASE_URL:http://localhost:9000/fineract-assets}
  max-file-size: ${STORAGE_MAX_FILE_SIZE:5242880}
  allowed-content-types: image/jpeg,image/png,image/webp

# Resilience4j Circuit Breaker
resilience4j:
  circuitbreaker:
    circuitBreakerAspectOrder: 2  # inner — sees individual attempt outcomes from the retry wrapper
    instances:
      fineract:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        recordExceptions:
          - com.adorsys.fineract.asset.exception.AssetException
          - org.springframework.web.reactive.function.client.WebClientResponseException
  retry:
    retryAspectOrder: 1  # outermost — retries before circuit breaker records a failure
    instances:
      fineract:
        maxAttempts: 3
        waitDuration: 500ms
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - org.springframework.web.reactive.function.client.WebClientRequestException
          - org.springframework.web.reactive.function.client.WebClientResponseException$ServiceUnavailable
          - org.springframework.web.reactive.function.client.WebClientResponseException$GatewayTimeout
          - java.util.concurrent.TimeoutException
  timelimiter:
    instances:
      fineract:
        timeoutDuration: 30s

# Actuator Configuration
management:
  server:
    port: 8084
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  info:
    git:
      mode: simple
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
    heapdump:
      enabled: ${MANAGEMENT_ENDPOINT_HEAPDUMP_ENABLED:true}
    threaddump:
      enabled: ${MANAGEMENT_ENDPOINT_THREADDUMP_ENABLED:true}
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    enabled: ${MANAGEMENT_TRACING_ENABLED:true}
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}

# Logging Configuration
logging:
  level:
    root: INFO
    com.adorsys.fineract.asset: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{traceId:-},%X{spanId:-}] [%X{correlationId:-}] %logger{36} - %msg%n"

# OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

---
# Kubernetes Profile
spring:
  config:
    activate:
      on-profile: kubernetes

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak.fineract.svc.cluster.local:8080/realms/fineract
          jwk-set-uri: http://keycloak.fineract.svc.cluster.local:8080/realms/fineract/protocol/openid-connect/certs

  data:
    redis:
      host: redis.fineract.svc.cluster.local
      password: ${REDIS_PASSWORD}

fineract:
  url: http://fineract.fineract.svc.cluster.local:8443/fineract-provider
  token-url: http://keycloak.fineract.svc.cluster.local:8080/realms/fineract/protocol/openid-connect/token

storage:
  endpoint: ${STORAGE_ENDPOINT:}
  access-key: ${STORAGE_ACCESS_KEY:}
  secret-key: ${STORAGE_SECRET_KEY:}
  public-base-url: ${STORAGE_PUBLIC_BASE_URL:}

logging:
  level:
    root: INFO
    com.adorsys.fineract.asset: INFO

# Enable OTLP tracing
management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4318/v1/traces}

# Swagger disabled in production
springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false
