spring:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  task:
    scheduling:
      pool:
        size: 0

app:
  security:
    permit-all-admin: true

asset-service:
  settlement-currency: XAF
  settlement-currency-product-short-name: VSAV
  outbox:
    dispatched-cutoff-seconds: 0
  gl-accounts:
    digital-asset-inventory: "47"
    customer-digital-asset-holdings: "65"
    transfers-in-suspense: "48"
    income-from-interest: "87"
    expense-account: "91"
    asset-issuance-payment-type: "Asset Issuance"
    fee-income: "87"
    fund-source: "42"
    savings-control: "42"
    lp-settlement-control: "42"
    lp-spread-payable: "42"
    lp-tax-withholding: "42"
    lp-fund-source: "42"
    platform-fee-payable: "42"
    mtn-mo-mo: "42"
    orange-money: "42"
    uba-bank: "42"
    afriland-bank: "42"
    tax-payable-fund-source: "42"

resilience4j:
  circuitbreaker:
    instances:
      fineract:
        slidingWindowSize: 100
        failureRateThreshold: 100
        waitDurationInOpenState: 1s

logging:
  level:
    com.adorsys.fineract: DEBUG
    org.testcontainers: INFO
    io.cucumber: INFO
