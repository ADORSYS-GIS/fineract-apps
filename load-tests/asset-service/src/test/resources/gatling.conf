gatling {
  core {
    runDescription = "Asset Service Load Test"
    encoding = "utf-8"
    simulationClass = ${?SIMULATION}
  }
  charting {
    noReports = false
    indicators {
      lowerBound = 200
      higherBound = 500
    }
  }
  http {
    fetchedCssCacheMaxCapacity = 0
    fetchedHtmlCacheMaxCapacity = 0
    warmUpUrl = ""
  }
  data {
    writers = [console, file]
    console {
      light = false
      writePeriod = 5
    }
  }
}
