server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker internal DNS for dynamic upstream resolution
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Rewrite hardcoded dev URLs baked into the JS bundle to relative paths so
    # all API traffic goes through the gateway (avoids cross-origin CORS failures).
    # VITE_ASSET_SERVICE_URL=http://localhost:8083 → strip to make /api/v1/... relative
    # VITE_FINERACT_API_URL=https://localhost/fineract-provider/api → relative
    sub_filter 'http://localhost:8083' '';
    sub_filter 'https://localhost/fineract-provider/api' '/fineract-provider/api';
    sub_filter_once off;
    sub_filter_types application/javascript;

    # Strip the Vite base path prefix so the SPA can serve from /
    rewrite ^/asset-manager/(.*) /$1 last;

    # Synthetic userinfo endpoint — returns OAuth2-Proxy headers injected by the
    # gateway as JSON so useAuth.ts can read the logged-in user in OAuth mode.
    location = /api/userinfo {
        default_type application/json;
        return 200 '{"user":"$http_x_auth_request_user","email":"$http_x_auth_request_email","roles":"$http_x_auth_request_groups"}';
    }

    # Asset Service API proxy (for direct access on port 3083; bypassed by gateway on port 8080)
    location /api/v1/ {
        set $upstream_asset asset-service;
        proxy_pass http://$upstream_asset:8083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Fineract API proxy (for direct access on port 3083; bypassed by gateway on port 8080)
    location /fineract-provider/ {
        set $upstream_fineract host.docker.internal;
        proxy_pass https://$upstream_fineract:8443;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Fineract-Platform-TenantId "default";
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # SPA routing — catch-all must come last
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
}
