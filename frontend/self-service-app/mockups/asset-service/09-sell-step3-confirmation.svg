<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844">
  <defs>
    <style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }</style>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#00000018"/></filter>
    <filter id="glow"><feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#ef444440"/></filter>
  </defs>

  <!-- Background -->
  <rect width="390" height="844" fill="#f3f4f6"/>

  <!-- Status Bar -->
  <rect width="390" height="44" fill="#ef4444"/>
  <text x="20" y="28" fill="white" font-size="13" font-weight="600">9:41</text>
  <text x="340" y="28" fill="white" font-size="11">▐▐▐ 🔋</text>

  <!-- Header -->
  <rect width="390" height="76" y="44" fill="#ef4444"/>
  <text x="195" y="90" fill="white" font-size="18" font-weight="700" text-anchor="middle">Sale Placed</text>

  <!-- Step Progress Bar - complete -->
  <rect x="16" y="132" width="358" height="6" rx="3" fill="#ef4444"/>
  <text x="16" y="154" fill="#ef4444" font-size="12" font-weight="600">Step 3 of 3 · Done!</text>

  <!-- Success Icon -->
  <circle cx="195" cy="240" r="60" fill="#fecaca" filter="url(#glow)"/>
  <circle cx="195" cy="240" r="48" fill="#ef4444"/>
  <!-- Checkmark -->
  <polyline points="171,240 186,256 220,220" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Success message -->
  <text x="195" y="328" fill="#111827" font-size="22" font-weight="700" text-anchor="middle">Sale Order Placed!</text>
  <text x="195" y="354" fill="#6b7280" font-size="14" text-anchor="middle">Your sell order has been submitted</text>
  <text x="195" y="374" fill="#6b7280" font-size="14" text-anchor="middle">successfully.</text>

  <!-- Order Reference -->
  <rect x="60" y="392" width="270" height="44" rx="12" fill="#fef2f2"/>
  <text x="195" y="410" fill="#6b7280" font-size="12" text-anchor="middle">Order Reference</text>
  <text x="195" y="428" fill="#dc2626" font-size="14" font-weight="700" text-anchor="middle">#ORD-2026-031788</text>

  <!-- Sale Details Card -->
  <rect x="16" y="450" width="358" height="200" rx="14" fill="white" filter="url(#shadow)"/>
  <text x="32" y="478" fill="#111827" font-size="15" font-weight="700">Sale Details</text>
  <line x1="32" y1="488" x2="358" y2="488" stroke="#f3f4f6" stroke-width="1"/>

  <text x="32" y="512" fill="#6b7280" font-size="13">Asset sold</text>
  <text x="358" y="512" fill="#111827" font-size="13" font-weight="600" text-anchor="end">Immo Plus (IMMO)</text>
  <line x1="32" y1="522" x2="358" y2="522" stroke="#f3f4f6" stroke-width="1"/>

  <text x="32" y="546" fill="#6b7280" font-size="13">Units sold</text>
  <text x="358" y="546" fill="#111827" font-size="13" font-weight="600" text-anchor="end">5 units</text>
  <line x1="32" y1="556" x2="358" y2="556" stroke="#f3f4f6" stroke-width="1"/>

  <text x="32" y="580" fill="#6b7280" font-size="13">Net proceeds</text>
  <text x="358" y="580" fill="#10b981" font-size="14" font-weight="700" text-anchor="end">+25,372.50 XAF</text>
  <line x1="32" y1="590" x2="358" y2="590" stroke="#f3f4f6" stroke-width="1"/>

  <text x="32" y="614" fill="#6b7280" font-size="13">Date</text>
  <text x="358" y="614" fill="#111827" font-size="13" text-anchor="end">Mar 17, 2026 · 09:43</text>
  <line x1="32" y1="624" x2="358" y2="624" stroke="#f3f4f6" stroke-width="1"/>

  <text x="32" y="648" fill="#6b7280" font-size="13">Status</text>
  <rect x="276" y="634" width="82" height="22" rx="11" fill="#fef9c3"/>
  <text x="317" y="649" fill="#ca8a04" font-size="12" font-weight="600" text-anchor="middle">⏳ Processing</text>

  <!-- Processing note -->
  <rect x="16" y="662" width="358" height="56" rx="12" fill="#fffbeb"/>
  <text x="195" y="684" fill="#92400e" font-size="12" text-anchor="middle">🕐 Proceeds will be credited to your wallet</text>
  <text x="195" y="700" fill="#92400e" font-size="12" text-anchor="middle">within 1 business day after order processing.</text>

  <!-- Action Buttons -->
  <rect x="16" y="730" width="172" height="52" rx="14" fill="#ef4444" filter="url(#shadow)"/>
  <text x="102" y="761" fill="white" font-size="14" font-weight="700" text-anchor="middle">💼 My Portfolio</text>

  <rect x="202" y="730" width="172" height="52" rx="14" fill="white" stroke="#ef4444" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="288" y="761" fill="#ef4444" font-size="14" font-weight="700" text-anchor="middle">📊 Market</text>

  <!-- Bottom Nav -->
  <rect x="0" y="796" width="390" height="48" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <text x="48" y="826" fill="#9ca3af" font-size="10" text-anchor="middle">🏠 Home</text>
  <text x="146" y="826" fill="#9ca3af" font-size="10" text-anchor="middle">📊 Market</text>
  <text x="244" y="826" fill="#ef4444" font-size="10" text-anchor="middle" font-weight="600">💼 Portfolio</text>
  <text x="342" y="826" fill="#9ca3af" font-size="10" text-anchor="middle">📋 History</text>
</svg>
