<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 960" width="390" height="960">
  <defs>
    <style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }</style>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#00000018"/></filter>
  </defs>

  <!-- Background -->
  <rect width="390" height="960" fill="#f3f4f6"/>

  <!-- Status Bar -->
  <rect width="390" height="44" fill="#1a56db"/>
  <text x="20" y="28" fill="white" font-size="13" font-weight="600">9:41</text>
  <text x="340" y="28" fill="white" font-size="11">▐▐▐ 🔋</text>

  <!-- Header -->
  <rect width="390" height="76" y="44" fill="#1a56db"/>
  <text x="36" y="90" fill="white" font-size="20">←</text>
  <text x="195" y="90" fill="white" font-size="18" font-weight="700" text-anchor="middle">Bond Detail</text>
  <text x="362" y="90" fill="white" font-size="18">♡</text>

  <!-- Asset Header Card -->
  <rect x="16" y="132" width="358" height="126" rx="14" fill="white" filter="url(#shadow)"/>
  <!-- icon -->
  <circle cx="56" cy="188" r="28" fill="#ede9fe"/>
  <text x="56" y="197" fill="#7c3aed" font-size="22" text-anchor="middle">🏛</text>
  <!-- name + symbol -->
  <text x="96" y="166" fill="#111827" font-size="17" font-weight="700">OTA 10Y 2034</text>
  <text x="96" y="182" fill="#9ca3af" font-size="12">OTA_10Y_2034 · Bonds</text>
  <!-- Badges row -->
  <rect x="96" y="190" width="62" height="20" rx="10" fill="#dcfce7"/>
  <text x="127" y="204" fill="#16a34a" font-size="11" font-weight="600" text-anchor="middle">● Active</text>
  <rect x="166" y="190" width="108" height="20" rx="10" fill="#ede9fe"/>
  <text x="220" y="204" fill="#7c3aed" font-size="11" font-weight="600" text-anchor="middle">OTA · Coupon Bond</text>
  <!-- ISIN + Issuer -->
  <text x="96" y="226" fill="#9ca3af" font-size="11">ISIN: CM0000123456</text>
  <text x="96" y="242" fill="#9ca3af" font-size="11">Issuer: Republic of Cameroon</text>

  <!-- Price Block -->
  <rect x="16" y="268" width="358" height="100" rx="14" fill="white" filter="url(#shadow)"/>
  <text x="32" y="292" fill="#6b7280" font-size="12">Dirty Price (Ask — incl. accrued interest)</text>
  <text x="32" y="320" fill="#111827" font-size="28" font-weight="700">10,075 XAF</text>
  <text x="32" y="340" fill="#6b7280" font-size="12">Clean price: <tspan fill="#111827" font-weight="600">9,750 XAF</tspan>  +  Accrued: <tspan fill="#7c3aed" font-weight="600">325 XAF</tspan></text>
  <!-- Bid/Ask -->
  <line x1="258" y1="278" x2="258" y2="358" stroke="#e5e7eb" stroke-width="1"/>
  <text x="278" y="292" fill="#6b7280" font-size="12">Bid</text>
  <text x="350" y="292" fill="#6b7280" font-size="12">Ask</text>
  <text x="278" y="312" fill="#10b981" font-size="15" font-weight="700">9,700</text>
  <text x="350" y="312" fill="#ef4444" font-size="15" font-weight="700">9,750</text>
  <text x="278" y="332" fill="#9ca3af" font-size="11">spread: 50</text>
  <text x="350" y="332" fill="#9ca3af" font-size="11">face: 10,000</text>

  <!-- Bond Details Card -->
  <rect x="16" y="378" width="358" height="168" rx="14" fill="white" filter="url(#shadow)"/>
  <text x="32" y="402" fill="#111827" font-size="14" font-weight="600">Bond Details</text>
  <line x1="32" y1="412" x2="358" y2="412" stroke="#f3f4f6" stroke-width="1"/>

  <!-- 2-col grid -->
  <text x="32" y="432" fill="#9ca3af" font-size="12">Interest Rate</text>
  <text x="32" y="448" fill="#111827" font-size="13" font-weight="600">7.50% p.a.</text>
  <text x="200" y="432" fill="#9ca3af" font-size="12">Face Value</text>
  <text x="200" y="448" fill="#111827" font-size="13" font-weight="600">10,000 XAF</text>

  <line x1="32" y1="458" x2="358" y2="458" stroke="#f3f4f6" stroke-width="1"/>
  <text x="32" y="476" fill="#9ca3af" font-size="12">Maturity Date</text>
  <text x="32" y="492" fill="#111827" font-size="13" font-weight="600">Oct 1, 2034</text>
  <text x="200" y="476" fill="#9ca3af" font-size="12">Coupon Frequency</text>
  <text x="200" y="492" fill="#111827" font-size="13" font-weight="600">Semi-annual</text>

  <line x1="32" y1="502" x2="358" y2="502" stroke="#f3f4f6" stroke-width="1"/>
  <text x="32" y="520" fill="#9ca3af" font-size="12">Next Coupon Date</text>
  <text x="32" y="536" fill="#111827" font-size="13" font-weight="600">Apr 1, 2026</text>
  <text x="200" y="520" fill="#9ca3af" font-size="12">Day Count</text>
  <text x="200" y="536" fill="#111827" font-size="13" font-weight="600">ACT/365</text>

  <!-- Accrued Interest Explanation -->
  <rect x="16" y="556" width="358" height="72" rx="12" fill="#eff6ff" filter="url(#shadow)"/>
  <text x="32" y="578" fill="#1e40af" font-size="13" font-weight="600">📅 Accrued Interest — What You Pay &amp; Receive</text>
  <text x="32" y="596" fill="#1d4ed8" font-size="12">Today you pay 325 XAF accrued interest to the seller.</text>
  <text x="32" y="612" fill="#1d4ed8" font-size="12">You receive the full next coupon of 375 XAF on Apr 1, 2026.</text>

  <!-- Coupon Forecast mini-table -->
  <rect x="16" y="638" width="358" height="124" rx="14" fill="white" filter="url(#shadow)"/>
  <text x="32" y="660" fill="#111827" font-size="14" font-weight="600">Coupon Forecast (per unit)</text>
  <line x1="32" y1="670" x2="358" y2="670" stroke="#f3f4f6" stroke-width="1"/>

  <!-- header row -->
  <text x="32" y="686" fill="#9ca3af" font-size="11">Date</text>
  <text x="220" y="686" fill="#9ca3af" font-size="11">Amount</text>
  <text x="358" y="686" fill="#9ca3af" font-size="11" text-anchor="end">Type</text>

  <line x1="32" y1="692" x2="358" y2="692" stroke="#f3f4f6" stroke-width="1"/>
  <text x="32" y="708" fill="#111827" font-size="13">Apr 1, 2026</text>
  <text x="220" y="708" fill="#16a34a" font-size="13" font-weight="600">375 XAF</text>
  <text x="358" y="708" fill="#6b7280" font-size="11" text-anchor="end">Coupon</text>

  <line x1="32" y1="718" x2="358" y2="718" stroke="#f3f4f6" stroke-width="1"/>
  <text x="32" y="734" fill="#111827" font-size="13">Oct 1, 2026</text>
  <text x="220" y="734" fill="#16a34a" font-size="13" font-weight="600">375 XAF</text>
  <text x="358" y="734" fill="#6b7280" font-size="11" text-anchor="end">Coupon</text>

  <line x1="32" y1="744" x2="358" y2="744" stroke="#f3f4f6" stroke-width="1"/>
  <text x="32" y="760" fill="#111827" font-size="13">Apr 1, 2027</text>
  <text x="220" y="760" fill="#16a34a" font-size="13" font-weight="600">375 XAF</text>
  <text x="358" y="760" fill="#6b7280" font-size="11" text-anchor="end">Coupon</text>

  <!-- Action Buttons -->
  <rect x="16" y="772" width="172" height="52" rx="12" fill="#1a56db" filter="url(#shadow)"/>
  <text x="102" y="803" fill="white" font-size="16" font-weight="700" text-anchor="middle">📈  Buy</text>
  <rect x="202" y="772" width="172" height="52" rx="12" fill="white" stroke="#1a56db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="288" y="803" fill="#1a56db" font-size="16" font-weight="700" text-anchor="middle">📉  Sell</text>

  <!-- Bottom Nav -->
  <rect x="0" y="912" width="390" height="48" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <text x="48" y="942" fill="#9ca3af" font-size="10" text-anchor="middle">🏠 Home</text>
  <text x="146" y="942" fill="#1a56db" font-size="10" text-anchor="middle" font-weight="600">📊 Market</text>
  <text x="244" y="942" fill="#9ca3af" font-size="10" text-anchor="middle">💼 Portfolio</text>
  <text x="342" y="942" fill="#9ca3af" font-size="10" text-anchor="middle">📋 History</text>
</svg>
