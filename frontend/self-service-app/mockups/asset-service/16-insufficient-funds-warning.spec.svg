<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 876" width="820" height="876">
  <defs>
    <style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }</style>
  </defs>

  <!-- Left: mockup -->
  <image href="./16-insufficient-funds-warning.svg" x="0" y="0" width="390" height="876"/>

  <!-- Divider -->
  <line x1="397" y1="0" x2="397" y2="876" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Annotation panel -->
  <rect x="397" y="0" width="423" height="876" fill="#f8fafc"/>

  <!-- Title -->
  <text x="408" y="26" fill="#111827" font-size="13" font-weight="700">16 · Insufficient Funds Warning</text>

  <!-- Endpoints -->
  <rect x="406" y="31" width="265" height="15" rx="3" fill="#fff7ed"/>
  <text x="410" y="42" font-size="10" font-family="monospace"><tspan fill="#c2410c" font-weight="700">POST</tspan><tspan fill="#1e40af"> /trades/quote</tspan></text>
  <text x="408" y="57" fill="#64748b" font-size="9">Same as screen 05 — this is the feasible=false state of that screen</text>

  <!-- Section: Insufficient Funds Banner -->
  <line x1="406" y1="72" x2="816" y2="72" stroke="#e2e8f0" stroke-width="1"/>
  <text x="408" y="84" fill="#1e3a5f" font-size="11" font-weight="700">⛔ Insufficient Funds Banner  (feasible = false)</text>
  <text x="410" y="100" fill="#64748b" font-size="10">Required amount</text>
  <text x="814" y="100" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">QuoteResponse.netAmount</text>
  <text x="410" y="114" fill="#64748b" font-size="10">Available balance</text>
  <text x="814" y="114" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">QuoteResponse.availableBalance</text>
  <text x="410" y="128" fill="#64748b" font-size="10">Shortfall</text>
  <text x="814" y="128" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">netAmount − availableBalance  (computed)</text>
  <text x="410" y="142" fill="#64748b" font-size="10">Banner shown when (feasibility trigger)</text>
  <text x="814" y="142" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">netAmount &gt; availableBalance  (client-derived)</text>

  <!-- Section: Order Summary (read-only) -->
  <line x1="406" y1="159" x2="816" y2="159" stroke="#e2e8f0" stroke-width="1"/>
  <text x="408" y="171" fill="#1e3a5f" font-size="11" font-weight="700">Order Summary  (read-only, same fields as screen 05)</text>
  <text x="410" y="187" fill="#64748b" font-size="10">Asset name</text>
  <text x="814" y="187" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">QuoteResponse.assetSymbol</text>
  <text x="410" y="201" fill="#64748b" font-size="10">Order type (BUY)</text>
  <text x="814" y="201" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">QuoteResponse.side</text>
  <text x="410" y="215" fill="#64748b" font-size="10">Units</text>
  <text x="814" y="215" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">QuoteResponse.units</text>
  <text x="410" y="229" fill="#64748b" font-size="10">Price per unit</text>
  <text x="814" y="229" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">QuoteResponse.executionPrice</text>
  <text x="410" y="243" fill="#64748b" font-size="10">Gross amount</text>
  <text x="814" y="243" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">QuoteResponse.grossAmount</text>
  <text x="410" y="257" fill="#64748b" font-size="10">Trading fee</text>
  <text x="814" y="257" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">QuoteResponse.fee  (.feePercent)</text>
  <text x="410" y="271" fill="#64748b" font-size="10">TVA (buyer only)</text>
  <text x="814" y="271" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">fee × 0.1925  (BuyStrategy computed)</text>
  <text x="410" y="285" fill="#64748b" font-size="10">Total</text>
  <text x="814" y="285" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">QuoteResponse.netAmount</text>

  <!-- Section: Balance Row (red) -->
  <line x1="406" y1="302" x2="816" y2="302" stroke="#e2e8f0" stroke-width="1"/>
  <text x="408" y="314" fill="#1e3a5f" font-size="11" font-weight="700">Balance Row  (red — insufficient)</text>
  <text x="410" y="330" fill="#64748b" font-size="10">✗ Insufficient balance badge</text>
  <text x="814" y="330" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">netAmount &gt; availableBalance</text>
  <text x="410" y="344" fill="#64748b" font-size="10">Available shown</text>
  <text x="814" y="344" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">QuoteResponse.availableBalance</text>
  <text x="410" y="358" fill="#64748b" font-size="10">Need X more</text>
  <text x="814" y="358" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">netAmount − availableBalance  (computed)</text>

  <!-- Section: Actions -->
  <line x1="406" y1="375" x2="816" y2="375" stroke="#e2e8f0" stroke-width="1"/>
  <text x="408" y="387" fill="#1e3a5f" font-size="11" font-weight="700">Actions</text>
  <text x="410" y="403" fill="#64748b" font-size="10">"Add funds to continue" button (DISABLED)</text>
  <text x="814" y="403" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">disabled when netAmount &gt; availableBalance</text>
  <text x="410" y="417" fill="#64748b" font-size="10">"+ Deposit Funds" primary CTA</text>
  <text x="814" y="417" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">navigates to Deposit flow (screen 15)</text>
  <text x="410" y="431" fill="#64748b" font-size="10">"Reduce amount" hint</text>
  <text x="814" y="431" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">navigates back to screen 04 or 04b</text>
  <text x="410" y="445" fill="#64748b" font-size="10">"Go Back" link</text>
  <text x="814" y="445" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">navigates back to Step 1</text>

  <!-- Notes -->
  <line x1="406" y1="462" x2="816" y2="462" stroke="#e2e8f0" stroke-width="1"/>
  <text x="408" y="474" fill="#1e3a5f" font-size="11" font-weight="700">Notes</text>
  <text x="410" y="488" fill="#b45309" font-size="9">ⓘ This state is reached when screen 05's feasibility check fails.</text>
  <text x="410" y="501" fill="#b45309" font-size="9">ⓘ No QuoteResponse.feasible field — derived client-side: netAmount &gt; availableBalance.</text>
  <text x="410" y="514" fill="#b45309" font-size="9">ⓘ After depositing funds, user returns to Step 1 to re-request a fresh quote.</text>
  <text x="410" y="527" fill="#b45309" font-size="9">ⓘ LP spread not shown (same rule as screen 05).</text>
</svg>
