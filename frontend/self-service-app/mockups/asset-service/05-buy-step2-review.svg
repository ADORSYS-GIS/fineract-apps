<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 960" width="390" height="960">
  <defs>
    <style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }</style>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#00000018"/></filter>
  </defs>

  <!-- Background -->
  <rect width="390" height="960" fill="#f3f4f6"/>

  <!-- Status Bar -->
  <rect width="390" height="44" fill="#1a56db"/>
  <text x="20" y="28" fill="white" font-size="13" font-weight="600">9:41</text>
  <text x="340" y="28" fill="white" font-size="11">▐▐▐ 🔋</text>

  <!-- Header -->
  <rect width="390" height="76" y="44" fill="#1a56db"/>
  <text x="36" y="90" fill="white" font-size="20">←</text>
  <text x="195" y="90" fill="white" font-size="18" font-weight="700" text-anchor="middle">Review Order</text>

  <!-- Step Progress Bar -->
  <rect x="16" y="132" width="358" height="6" rx="3" fill="#e5e7eb"/>
  <rect x="16" y="132" width="239" height="6" rx="3" fill="#1a56db"/>
  <text x="16" y="154" fill="#1a56db" font-size="12" font-weight="600">Step 2 of 3 · Review &amp; Confirm</text>

  <!-- MARKET CLOSED warning banner (QuoteResponse.warnings = ["MARKET_CLOSED"]) -->
  <rect x="16" y="166" width="358" height="44" rx="12" fill="#fffbeb"/>
  <text x="32" y="183" fill="#92400e" font-size="13" font-weight="600">⏰  Market Closed</text>
  <text x="32" y="200" fill="#92400e" font-size="11">Order will queue and execute at market open (08:00 WAT)</text>

  <!-- Review note -->
  <rect x="16" y="218" width="358" height="36" rx="12" fill="#eff6ff"/>
  <text x="195" y="241" fill="#1e40af" font-size="12" text-anchor="middle">📋 Please review your order carefully before confirming</text>

  <!-- Order Summary Card — fee + TVA + registration duty -->
  <rect x="16" y="262" width="358" height="408" rx="14" fill="white" filter="url(#shadow)"/>
  <text x="32" y="290" fill="#111827" font-size="15" font-weight="700">Order Summary</text>

  <!-- Asset row -->
  <line x1="32" y1="300" x2="358" y2="300" stroke="#f3f4f6" stroke-width="1"/>
  <circle cx="48" cy="324" r="16" fill="#fef3c7"/>
  <text x="48" y="330" fill="#d97706" font-size="14" text-anchor="middle">🏠</text>
  <text x="72" y="319" fill="#6b7280" font-size="12">Asset</text>
  <text x="72" y="335" fill="#111827" font-size="14" font-weight="600">Immo Plus (IMMO)</text>
  <text x="358" y="327" fill="#6b7280" font-size="12" text-anchor="end">Real Estate</text>

  <line x1="32" y1="350" x2="358" y2="350" stroke="#f3f4f6" stroke-width="1"/>
  <text x="32" y="372" fill="#6b7280" font-size="13">Order Type</text>
  <rect x="282" y="359" width="70" height="22" rx="11" fill="#dcfce7"/>
  <text x="317" y="374" fill="#16a34a" font-size="12" font-weight="600" text-anchor="middle">📈 BUY</text>

  <line x1="32" y1="388" x2="358" y2="388" stroke="#f3f4f6" stroke-width="1"/>
  <text x="32" y="410" fill="#6b7280" font-size="13">Units to buy</text>
  <text x="358" y="410" fill="#111827" font-size="14" font-weight="700" text-anchor="end">10 units</text>

  <line x1="32" y1="426" x2="358" y2="426" stroke="#f3f4f6" stroke-width="1"/>
  <!-- Price per unit already includes LP spread — not itemised separately -->
  <text x="32" y="448" fill="#6b7280" font-size="13">Price per unit</text>
  <text x="358" y="448" fill="#111827" font-size="14" text-anchor="end">5,200 XAF</text>

  <line x1="32" y1="464" x2="358" y2="464" stroke="#f3f4f6" stroke-width="1"/>
  <text x="32" y="486" fill="#6b7280" font-size="13">Gross amount</text>
  <text x="358" y="486" fill="#111827" font-size="14" text-anchor="end">52,000 XAF</text>

  <line x1="32" y1="502" x2="358" y2="502" stroke="#f3f4f6" stroke-width="1"/>
  <text x="32" y="522" fill="#6b7280" font-size="13">Trading fee (0.3%)</text>
  <text x="358" y="522" fill="#ef4444" font-size="13" text-anchor="end">+156 XAF</text>

  <line x1="32" y1="536" x2="358" y2="536" stroke="#f3f4f6" stroke-width="1"/>
  <text x="32" y="556" fill="#6b7280" font-size="13">TVA (19.25% on fee)</text>
  <text x="358" y="556" fill="#ef4444" font-size="13" text-anchor="end">+30 XAF</text>

  <line x1="32" y1="572" x2="358" y2="572" stroke="#f3f4f6" stroke-width="1"/>
  <!-- Registration duty — asset-configurable tax, shown here as example (2% of gross) -->
  <text x="32" y="592" fill="#6b7280" font-size="13">Registration duty (2%)</text>
  <text x="358" y="592" fill="#ef4444" font-size="13" text-anchor="end">+1,040 XAF</text>

  <!-- Total divider -->
  <line x1="16" y1="608" x2="374" y2="608" stroke="#e5e7eb" stroke-width="2"/>
  <text x="32" y="630" fill="#111827" font-size="15" font-weight="700">Total</text>
  <text x="358" y="630" fill="#1a56db" font-size="20" font-weight="700" text-anchor="end">53,226 XAF</text>

  <!-- Remainder (computedFromAmount leftover) -->
  <text x="195" y="650" fill="#9ca3af" font-size="11" text-anchor="middle">↩  168 XAF remainder returned to your wallet</text>

  <!-- Feasibility row (feasible=true) -->
  <line x1="32" y1="660" x2="358" y2="660" stroke="#f3f4f6" stroke-width="1"/>
  <text x="32" y="678" fill="#6b7280" font-size="13">Available balance</text>
  <text x="358" y="678" fill="#15803d" font-size="13" font-weight="600" text-anchor="end">✓ 850,000 XAF</text>

  <!-- Balance after -->
  <rect x="16" y="684" width="358" height="44" rx="10" fill="#f0fdf4"/>
  <text x="32" y="702" fill="#6b7280" font-size="12">After purchase</text>
  <text x="358" y="702" fill="#15803d" font-size="14" font-weight="700" text-anchor="end">796,774 XAF</text>
  <text x="32" y="720" fill="#9ca3af" font-size="11">850,000 → 796,774 XAF</text>

  <!-- Important note -->
  <rect x="16" y="738" width="358" height="52" rx="12" fill="#fffbeb"/>
  <text x="32" y="758" fill="#92400e" font-size="13" font-weight="600">⚠️ Important</text>
  <text x="32" y="774" fill="#92400e" font-size="12">• Lock-up period: 90 days after purchase</text>
  <text x="32" y="790" fill="#92400e" font-size="12">• Price locked 30 s — confirm before it expires</text>

  <!-- Confirm Button -->
  <rect x="16" y="800" width="358" height="52" rx="14" fill="#1a56db" filter="url(#shadow)"/>
  <text x="195" y="831" fill="white" font-size="16" font-weight="700" text-anchor="middle">✓  Confirm &amp; Buy</text>

  <!-- Go Back -->
  <text x="195" y="870" fill="#1a56db" font-size="14" text-anchor="middle">← Go Back</text>

  <!-- Bottom Nav -->
  <rect x="0" y="912" width="390" height="48" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <text x="48" y="942" fill="#9ca3af" font-size="10" text-anchor="middle">🏠 Home</text>
  <text x="146" y="942" fill="#1a56db" font-size="10" text-anchor="middle" font-weight="600">📊 Market</text>
  <text x="244" y="942" fill="#9ca3af" font-size="10" text-anchor="middle">💼 Portfolio</text>
  <text x="342" y="942" fill="#9ca3af" font-size="10" text-anchor="middle">📋 History</text>
</svg>
