<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844">
  <defs>
    <style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }</style>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#00000018"/></filter>
  </defs>

  <!-- Background -->
  <rect width="390" height="844" fill="#f3f4f6"/>

  <!-- Status Bar -->
  <rect width="390" height="44" fill="#1a56db"/>
  <text x="20" y="28" fill="white" font-size="13" font-weight="600">9:41</text>
  <text x="340" y="28" fill="white" font-size="11">▐▐▐ 🔋</text>

  <!-- Header -->
  <rect width="390" height="76" y="44" fill="#1a56db"/>
  <text x="36" y="90" fill="white" font-size="20">←</text>
  <text x="195" y="90" fill="white" font-size="18" font-weight="700" text-anchor="middle">Buy Asset</text>

  <!-- Step Progress Bar -->
  <rect x="16" y="132" width="358" height="6" rx="3" fill="#e5e7eb"/>
  <rect x="16" y="132" width="120" height="6" rx="3" fill="#1a56db"/>
  <text x="16" y="154" fill="#1a56db" font-size="12" font-weight="600">Step 1 of 3 · Enter Amount</text>

  <!-- Asset Info -->
  <rect x="16" y="166" width="358" height="72" rx="14" fill="white" filter="url(#shadow)"/>
  <circle cx="50" cy="202" r="20" fill="#fef3c7"/>
  <text x="50" y="209" fill="#d97706" font-size="18" text-anchor="middle">🏠</text>
  <text x="80" y="194" fill="#111827" font-size="15" font-weight="700">Immo Plus</text>
  <text x="80" y="212" fill="#9ca3af" font-size="12">IMMO · Real Estate</text>
  <text x="358" y="194" fill="#111827" font-size="15" font-weight="700" text-anchor="end">5,200 XAF/unit</text>
  <text x="358" y="212" fill="#10b981" font-size="12" text-anchor="end">▲ +1.8%</text>

  <!-- Available Balance -->
  <rect x="16" y="250" width="358" height="56" rx="12" fill="#eff6ff"/>
  <text x="32" y="274" fill="#1e40af" font-size="13">Available Balance</text>
  <text x="358" y="274" fill="#1e40af" font-size="16" font-weight="700" text-anchor="end">850,000 XAF</text>
  <text x="32" y="294" fill="#6b7280" font-size="11">Your wallet · Updated just now</text>

  <!-- Input Mode Toggle -->
  <rect x="16" y="320" width="358" height="44" rx="12" fill="#e5e7eb"/>
  <rect x="18" y="322" width="177" height="40" rx="10" fill="white" filter="url(#shadow)"/>
  <text x="107" y="347" fill="#111827" font-size="13" font-weight="600" text-anchor="middle">Amount (XAF)</text>
  <text x="303" y="347" fill="#9ca3af" font-size="13" text-anchor="middle">Number of Units</text>

  <!-- Amount Input -->
  <text x="20" y="390" fill="#374151" font-size="13" font-weight="600">Investment Amount</text>
  <rect x="16" y="400" width="358" height="62" rx="12" fill="white" stroke="#1a56db" stroke-width="2" filter="url(#shadow)"/>
  <text x="32" y="438" fill="#111827" font-size="28" font-weight="700">52,000</text>
  <text x="334" y="438" fill="#6b7280" font-size="16" font-weight="600">XAF</text>
  <line x1="32" y1="444" x2="120" y2="444" stroke="#1a56db" stroke-width="2"/>

  <!-- Quick Amount Buttons -->
  <text x="20" y="486" fill="#6b7280" font-size="12">Quick select</text>
  <rect x="16" y="494" width="80" height="32" rx="10" fill="#dbeafe"/>
  <text x="56" y="514" fill="#1e40af" font-size="12" font-weight="600" text-anchor="middle">10K XAF</text>
  <rect x="104" y="494" width="80" height="32" rx="10" fill="#dbeafe"/>
  <text x="144" y="514" fill="#1e40af" font-size="12" font-weight="600" text-anchor="middle">25K XAF</text>
  <rect x="192" y="494" width="80" height="32" rx="10" fill="#1a56db"/>
  <text x="232" y="514" fill="white" font-size="12" font-weight="600" text-anchor="middle">50K XAF</text>
  <rect x="280" y="494" width="80" height="32" rx="10" fill="#dbeafe"/>
  <text x="320" y="514" fill="#1e40af" font-size="12" font-weight="600" text-anchor="middle">100K XAF</text>

  <!-- Order Estimate -->
  <rect x="16" y="542" width="358" height="130" rx="14" fill="white" filter="url(#shadow)"/>
  <text x="32" y="566" fill="#111827" font-size="14" font-weight="600">Order Estimate</text>
  <!-- Row -->
  <text x="32" y="594" fill="#6b7280" font-size="13">Units to receive</text>
  <text x="358" y="594" fill="#111827" font-size="14" font-weight="700" text-anchor="end">10 units</text>
  <line x1="32" y1="604" x2="358" y2="604" stroke="#f3f4f6" stroke-width="1"/>
  <text x="32" y="624" fill="#6b7280" font-size="13">Unit price</text>
  <text x="358" y="624" fill="#111827" font-size="13" text-anchor="end">5,200 XAF</text>
  <line x1="32" y1="634" x2="358" y2="634" stroke="#f3f4f6" stroke-width="1"/>
  <text x="32" y="654" fill="#6b7280" font-size="13">Trading fee (0.5%)</text>
  <text x="358" y="654" fill="#ef4444" font-size="13" text-anchor="end">-260 XAF</text>
  <line x1="32" y1="664" x2="358" y2="664" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- Total -->
  <rect x="16" y="682" width="358" height="50" rx="12" fill="#f0fdf4"/>
  <text x="32" y="712" fill="#15803d" font-size="14" font-weight="600">Total to pay</text>
  <text x="358" y="712" fill="#15803d" font-size="18" font-weight="700" text-anchor="end">52,260 XAF</text>

  <!-- Min order note -->
  <text x="195" y="748" fill="#9ca3af" font-size="12" text-anchor="middle">Minimum order: 1 unit (5,200 XAF)</text>

  <!-- Continue Button -->
  <rect x="16" y="760" width="358" height="52" rx="14" fill="#1a56db" filter="url(#shadow)"/>
  <text x="195" y="791" fill="white" font-size="16" font-weight="700" text-anchor="middle">Continue →</text>

  <!-- Bottom Nav -->
  <rect x="0" y="796" width="390" height="48" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <text x="48" y="826" fill="#9ca3af" font-size="10" text-anchor="middle">🏠 Home</text>
  <text x="146" y="826" fill="#1a56db" font-size="10" text-anchor="middle" font-weight="600">📊 Market</text>
  <text x="244" y="826" fill="#9ca3af" font-size="10" text-anchor="middle">💼 Portfolio</text>
  <text x="342" y="826" fill="#9ca3af" font-size="10" text-anchor="middle">📋 History</text>
</svg>
