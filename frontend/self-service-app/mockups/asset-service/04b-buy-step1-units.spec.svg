<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 844" width="820" height="844">
  <defs>
    <style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }</style>
  </defs>

  <!-- Left: mockup -->
  <image href="./04b-buy-step1-units.svg" x="0" y="0" width="390" height="844"/>

  <!-- Divider -->
  <line x1="397" y1="0" x2="397" y2="844" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Annotation panel -->
  <rect x="397" y="0" width="423" height="844" fill="#f8fafc"/>

  <!-- Title -->
  <text x="408" y="26" fill="#111827" font-size="13" font-weight="700">04b · Buy — Step 1  (Enter Units)</text>

  <!-- Endpoints -->
  <rect x="406" y="31" width="254" height="15" rx="3" fill="#ecfdf5"/>
  <text x="410" y="42" font-size="10" font-family="monospace"><tspan fill="#065f46" font-weight="700">GET</tspan><tspan fill="#1e40af"> /assets/{id}</tspan></text>
  <text x="408" y="57" fill="#64748b" font-size="9">cached · AssetPublicDetailResponse</text>

  <rect x="406" y="62" width="265" height="15" rx="3" fill="#fff7ed"/>
  <text x="410" y="73" font-size="10" font-family="monospace"><tspan fill="#c2410c" font-weight="700">POST</tspan><tspan fill="#1e40af"> /trades/quote</tspan></text>
  <text x="408" y="88" fill="#64748b" font-size="9">QuoteRequest (units mode) → QuoteResponse  (live)</text>

  <!-- Section: Asset Info Bar -->
  <line x1="406" y1="103" x2="816" y2="103" stroke="#e2e8f0" stroke-width="1"/>
  <text x="408" y="115" fill="#1e3a5f" font-size="11" font-weight="700">Asset Info Bar</text>
  <text x="410" y="131" fill="#64748b" font-size="10">Asset name / Symbol / Category</text>
  <text x="814" y="131" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">AssetPublicDetailResponse.name / .symbol / .category</text>
  <text x="410" y="145" fill="#64748b" font-size="10">Ask price per unit</text>
  <text x="814" y="145" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">.askPrice</text>
  <text x="410" y="159" fill="#64748b" font-size="10">24h change %</text>
  <text x="814" y="159" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">.change24hPercent</text>

  <!-- Section: Available Balance -->
  <line x1="406" y1="176" x2="816" y2="176" stroke="#e2e8f0" stroke-width="1"/>
  <text x="408" y="188" fill="#1e3a5f" font-size="11" font-weight="700">Available Balance  (Fineract)</text>
  <text x="410" y="204" fill="#64748b" font-size="10">Cash balance</text>
  <text x="814" y="204" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">SavingsAccount.summary.availableBalance</text>

  <!-- Section: Units Input -->
  <line x1="406" y1="221" x2="816" y2="221" stroke="#e2e8f0" stroke-width="1"/>
  <text x="408" y="233" fill="#1e3a5f" font-size="11" font-weight="700">Units Input  (stepper +/−)</text>
  <text x="410" y="249" fill="#64748b" font-size="10">Units entered</text>
  <text x="814" y="249" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">QuoteRequest.units</text>
  <text x="410" y="263" fill="#64748b" font-size="10">Direction</text>
  <text x="814" y="263" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">QuoteRequest.side = BUY</text>
  <text x="410" y="277" fill="#64748b" font-size="10">Quick-select (1 / 5 / 10 / 25 / 50 / 100)</text>
  <text x="814" y="277" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">sets QuoteRequest.units</text>

  <!-- Section: Unit Availability -->
  <line x1="406" y1="294" x2="816" y2="294" stroke="#e2e8f0" stroke-width="1"/>
  <text x="408" y="306" fill="#1e3a5f" font-size="11" font-weight="700">Unit Availability Row</text>
  <text x="410" y="322" fill="#64748b" font-size="10">Available in market</text>
  <text x="814" y="322" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">QuoteResponse.availableSupply</text>
  <text x="410" y="336" fill="#64748b" font-size="10">Max order size</text>
  <text x="814" y="336" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">AssetPublicDetailResponse.maxOrderSize</text>

  <!-- Section: Order Estimate -->
  <line x1="406" y1="353" x2="816" y2="353" stroke="#e2e8f0" stroke-width="1"/>
  <text x="408" y="365" fill="#1e3a5f" font-size="11" font-weight="700">Order Estimate  (QuoteResponse)</text>
  <text x="410" y="381" fill="#64748b" font-size="10">Units to buy</text>
  <text x="814" y="381" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">QuoteResponse.units</text>
  <text x="410" y="395" fill="#64748b" font-size="10">Price per unit (Ask, incl. LP spread)</text>
  <text x="814" y="395" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">QuoteResponse.executionPrice</text>
  <text x="410" y="409" fill="#64748b" font-size="10">Trading fee</text>
  <text x="814" y="409" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">QuoteResponse.fee  (.feePercent %)</text>
  <text x="410" y="423" fill="#64748b" font-size="10">Total to pay</text>
  <text x="814" y="423" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">QuoteResponse.netAmount</text>
  <text x="410" y="437" fill="#64748b" font-size="10">Remaining balance after purchase</text>
  <text x="814" y="437" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">availableBalance − netAmount (computed)</text>

  <!-- Notes -->
  <line x1="406" y1="454" x2="816" y2="454" stroke="#e2e8f0" stroke-width="1"/>
  <text x="408" y="466" fill="#1e3a5f" font-size="11" font-weight="700">Notes</text>
  <text x="410" y="480" fill="#b45309" font-size="9">ⓘ This is the units-entry variant of screen 04 (same endpoint, different input field).</text>
  <text x="410" y="493" fill="#b45309" font-size="9">ⓘ Toggle back to "Amount (XAF)" mode navigates to screen 04.</text>
  <text x="410" y="506" fill="#b45309" font-size="9">ⓘ "Continue" caches QuoteResponse.orderId and navigates to screen 05.</text>
  <text x="410" y="519" fill="#b45309" font-size="9">ⓘ LP spread is NOT shown; it is already included in executionPrice.</text>
</svg>
