<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 844" width="820" height="844">
  <defs>
    <style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }</style>
  </defs>

  <!-- Left: mockup -->
  <image href="./07-sell-step1-amount.svg" x="0" y="0" width="390" height="844"/>

  <!-- Divider -->
  <line x1="397" y1="0" x2="397" y2="844" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Annotation panel -->
  <rect x="397" y="0" width="423" height="844" fill="#f8fafc"/>

  <!-- Title -->
  <text x="408" y="26" fill="#111827" font-size="13" font-weight="700">07 · Sell — Step 1  (Select Units to Sell)</text>

  <!-- Endpoints -->
  <rect x="406" y="31" width="380" height="15" rx="3" fill="#ecfdf5"/>
  <text x="410" y="42" font-size="10" font-family="monospace"><tspan fill="#065f46" font-weight="700">GET</tspan><tspan fill="#1e40af"> /portfolio/positions/{assetId}</tspan></text>
  <text x="408" y="57" fill="#64748b" font-size="9">Response: PositionResponse  (user's current holdings)</text>

  <rect x="406" y="62" width="265" height="15" rx="3" fill="#fff7ed"/>
  <text x="410" y="73" font-size="10" font-family="monospace"><tspan fill="#c2410c" font-weight="700">POST</tspan><tspan fill="#1e40af"> /trades/quote</tspan></text>
  <text x="408" y="88" fill="#64748b" font-size="9">QuoteRequest (side=SELL) → QuoteResponse  (live, on input change)</text>

  <!-- Section: Asset Info Bar -->
  <line x1="406" y1="103" x2="816" y2="103" stroke="#e2e8f0" stroke-width="1"/>
  <text x="408" y="115" fill="#1e3a5f" font-size="11" font-weight="700">Asset Info Bar</text>
  <text x="410" y="131" fill="#64748b" font-size="10">Asset name / Symbol / Category</text>
  <text x="814" y="131" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">AssetPublicDetailResponse.name / .symbol / .category</text>
  <text x="410" y="145" fill="#64748b" font-size="10">Bid price per unit  (sell at bid, not ask)</text>
  <text x="814" y="145" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">AssetPublicDetailResponse.bidPrice</text>

  <!-- Section: Holdings Card -->
  <line x1="406" y1="162" x2="816" y2="162" stroke="#e2e8f0" stroke-width="1"/>
  <text x="408" y="174" fill="#1e3a5f" font-size="11" font-weight="700">Your Holdings Card</text>
  <text x="410" y="190" fill="#64748b" font-size="10">Units held</text>
  <text x="814" y="190" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">PositionResponse.totalUnits</text>
  <text x="410" y="204" fill="#64748b" font-size="10">Total value at bid price</text>
  <text x="814" y="204" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">totalUnits × bidPrice  (computed)</text>
  <text x="410" y="218" fill="#64748b" font-size="10">Lock-up end date</text>
  <text x="814" y="218" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">purchaseDate + lockupDays  (computed)</text>
  <text x="410" y="231" fill="#b45309" font-size="9">  purchaseDate from order history; lockupDays from AssetPublicDetailResponse</text>

  <!-- Section: Lock-up Warning -->
  <line x1="406" y1="246" x2="816" y2="246" stroke="#e2e8f0" stroke-width="1"/>
  <text x="408" y="258" fill="#1e3a5f" font-size="11" font-weight="700">Lock-up Warning  (shown if units are locked)</text>
  <text x="410" y="274" fill="#64748b" font-size="10">Warning active when lock-up end &gt; today</text>
  <text x="814" y="274" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">client-side date check</text>

  <!-- Section: Units Input -->
  <line x1="406" y1="291" x2="816" y2="291" stroke="#e2e8f0" stroke-width="1"/>
  <text x="408" y="303" fill="#1e3a5f" font-size="11" font-weight="700">Units to Sell Input</text>
  <text x="410" y="319" fill="#64748b" font-size="10">Units entered</text>
  <text x="814" y="319" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">QuoteRequest.units</text>
  <text x="410" y="333" fill="#64748b" font-size="10">Direction</text>
  <text x="814" y="333" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">QuoteRequest.side = SELL</text>
  <text x="410" y="347" fill="#64748b" font-size="10">% quick-select (25% / 50% / 75% / All)</text>
  <text x="814" y="347" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">totalUnits × pct  (computed, sets QuoteRequest.units)</text>
  <text x="410" y="361" fill="#64748b" font-size="10">Slider position</text>
  <text x="814" y="361" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">units / totalUnits × 100  (client UI state)</text>

  <!-- Section: Estimated Proceeds -->
  <line x1="406" y1="378" x2="816" y2="378" stroke="#e2e8f0" stroke-width="1"/>
  <text x="408" y="390" fill="#1e3a5f" font-size="11" font-weight="700">Estimated Proceeds  (QuoteResponse)</text>
  <text x="410" y="406" fill="#64748b" font-size="10">Units to sell</text>
  <text x="814" y="406" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">QuoteResponse.units</text>
  <text x="410" y="420" fill="#64748b" font-size="10">Bid price per unit  (incl. LP spread)</text>
  <text x="814" y="420" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">QuoteResponse.executionPrice</text>
  <text x="410" y="434" fill="#64748b" font-size="10">Trading fee (0.3%)</text>
  <text x="814" y="434" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">QuoteResponse.fee  (.feePercent)</text>
  <text x="410" y="448" fill="#64748b" font-size="10">Net Proceeds</text>
  <text x="814" y="448" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">QuoteResponse.netAmount</text>

  <!-- Notes -->
  <line x1="406" y1="465" x2="816" y2="465" stroke="#e2e8f0" stroke-width="1"/>
  <text x="408" y="477" fill="#1e3a5f" font-size="11" font-weight="700">Notes</text>
  <text x="410" y="491" fill="#b45309" font-size="9">ⓘ No TVA on sell — TVA is buyer-only (confirmed in SellStrategy).</text>
  <text x="410" y="504" fill="#b45309" font-size="9">ⓘ Capital gains tax shown in review screen (08) if taxBreakdown.capitalGainsTaxAmount &gt; 0.</text>
  <text x="410" y="517" fill="#b45309" font-size="9">ⓘ LP spread is baked into executionPrice (bid side) — never itemised.</text>
  <text x="410" y="530" fill="#b45309" font-size="9">ⓘ "Continue" caches QuoteResponse and navigates to screen 08.</text>
</svg>
