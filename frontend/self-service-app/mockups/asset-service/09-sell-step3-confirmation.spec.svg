<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 844" width="820" height="844">
  <defs>
    <style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }</style>
  </defs>

  <!-- Left: mockup -->
  <image href="./09-sell-step3-confirmation.svg" x="0" y="0" width="390" height="844"/>

  <!-- Divider -->
  <line x1="397" y1="0" x2="397" y2="844" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Annotation panel -->
  <rect x="397" y="0" width="423" height="844" fill="#f8fafc"/>

  <!-- Title -->
  <text x="408" y="26" fill="#111827" font-size="13" font-weight="700">09 · Sell — Step 3 Confirmation</text>

  <!-- Endpoints -->
  <rect x="406" y="31" width="360" height="15" rx="3" fill="#fff7ed"/>
  <text x="410" y="42" font-size="10" font-family="monospace"><tspan fill="#c2410c" font-weight="700">POST</tspan><tspan fill="#1e40af"> /trades/orders/{orderId}/confirm</tspan></text>
  <text x="408" y="57" fill="#64748b" font-size="9">orderId from QuoteResponse · Response: OrderResponse</text>

  <rect x="406" y="62" width="376" height="15" rx="3" fill="#ecfdf5"/>
  <text x="410" y="73" font-size="10" font-family="monospace"><tspan fill="#065f46" font-weight="700">GET</tspan><tspan fill="#1e40af"> /trades/orders/{orderId}/stream</tspan></text>
  <text x="408" y="88" fill="#64748b" font-size="9">SSE EventSource for real-time status updates</text>

  <!-- Section: Order Reference -->
  <line x1="406" y1="103" x2="816" y2="103" stroke="#e2e8f0" stroke-width="1"/>
  <text x="408" y="115" fill="#1e3a5f" font-size="11" font-weight="700">Order Reference</text>
  <text x="410" y="131" fill="#64748b" font-size="10">Sale order reference (#ORD-…)</text>
  <text x="814" y="131" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">OrderResponse.orderId</text>

  <!-- Section: Sale Details Card -->
  <line x1="406" y1="148" x2="816" y2="148" stroke="#e2e8f0" stroke-width="1"/>
  <text x="408" y="160" fill="#1e3a5f" font-size="11" font-weight="700">Sale Details Card</text>
  <text x="410" y="176" fill="#64748b" font-size="10">Asset sold (Symbol)</text>
  <text x="814" y="176" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">OrderResponse.symbol</text>
  <text x="410" y="190" fill="#64748b" font-size="10">Units sold</text>
  <text x="814" y="190" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">OrderResponse.units</text>
  <text x="410" y="204" fill="#64748b" font-size="10">Net proceeds</text>
  <text x="814" y="204" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">OrderResponse.totalAmount</text>
  <text x="410" y="218" fill="#64748b" font-size="10">Date &amp; time</text>
  <text x="814" y="218" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">OrderResponse.createdAt</text>
  <text x="410" y="232" fill="#64748b" font-size="10">Status badge</text>
  <text x="814" y="232" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">OrderResponse.status</text>

  <!-- Section: Status Progression -->
  <line x1="406" y1="249" x2="816" y2="249" stroke="#e2e8f0" stroke-width="1"/>
  <text x="408" y="261" fill="#1e3a5f" font-size="11" font-weight="700">Status Progression  (OrderStatus enum)</text>
  <text x="410" y="277" fill="#64748b" font-size="10">Initial</text>
  <text x="814" y="277" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">QUEUED / PENDING</text>
  <text x="410" y="291" fill="#64748b" font-size="10">Processing</text>
  <text x="814" y="291" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">EXECUTING</text>
  <text x="410" y="305" fill="#64748b" font-size="10">Success (proceeds credited to wallet)</text>
  <text x="814" y="305" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">FILLED</text>
  <text x="410" y="319" fill="#64748b" font-size="10">Failure</text>
  <text x="814" y="319" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">FAILED / REJECTED</text>

  <!-- Notes -->
  <line x1="406" y1="336" x2="816" y2="336" stroke="#e2e8f0" stroke-width="1"/>
  <text x="408" y="348" fill="#1e3a5f" font-size="11" font-weight="700">Notes</text>
  <text x="410" y="362" fill="#b45309" font-size="9">ⓘ "My Portfolio" button → screen 10; "Market" → screen 02.</text>
  <text x="410" y="375" fill="#b45309" font-size="9">ⓘ Proceeds credited within 1 business day after FILLED status.</text>
  <text x="410" y="388" fill="#b45309" font-size="9">ⓘ SSE stream GET /trades/orders/{id}/stream for live status push.</text>
</svg>
