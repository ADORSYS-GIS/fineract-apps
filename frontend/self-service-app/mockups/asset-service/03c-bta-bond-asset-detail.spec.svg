<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 844" width="820" height="844">
  <defs>
    <style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }</style>
  </defs>

  <!-- Left: mockup -->
  <image href="./03c-bta-bond-asset-detail.svg" x="0" y="0" width="390" height="844"/>

  <!-- Divider -->
  <line x1="397" y1="0" x2="397" y2="844" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Annotation panel -->
  <rect x="397" y="0" width="423" height="844" fill="#f8fafc"/>

  <!-- Title -->
  <text x="408" y="26" fill="#111827" font-size="13" font-weight="700">03c · Bond Asset Detail  (BTA Discount Bond)</text>

  <!-- Endpoint -->
  <rect x="406" y="31" width="254" height="15" rx="3" fill="#ecfdf5"/>
  <text x="410" y="42" font-size="10" font-family="monospace"><tspan fill="#065f46" font-weight="700">GET</tspan><tspan fill="#1e40af"> /assets/{id}</tspan></text>
  <text x="408" y="57" fill="#64748b" font-size="9">Response: AssetPublicDetailResponse  (bondType=DISCOUNT fields populated)</text>

  <!-- Section: Asset Header Card -->
  <line x1="406" y1="72" x2="816" y2="72" stroke="#e2e8f0" stroke-width="1"/>
  <text x="408" y="84" fill="#1e3a5f" font-size="11" font-weight="700">Asset Header Card</text>
  <text x="410" y="100" fill="#64748b" font-size="10">Bond name</text>
  <text x="814" y="100" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">AssetPublicDetailResponse.name</text>
  <text x="410" y="114" fill="#64748b" font-size="10">Bond type badge ("BTA · Discount Bond")</text>
  <text x="814" y="114" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">.bondType  (DISCOUNT → "BTA · Discount Bond")</text>
  <text x="410" y="128" fill="#64748b" font-size="10">ISIN code</text>
  <text x="814" y="128" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">.isinCode</text>
  <text x="410" y="142" fill="#64748b" font-size="10">Issuer name</text>
  <text x="814" y="142" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">.issuerName</text>

  <!-- Section: Price Block -->
  <line x1="406" y1="159" x2="816" y2="159" stroke="#e2e8f0" stroke-width="1"/>
  <text x="408" y="171" fill="#1e3a5f" font-size="11" font-weight="700">Price Block  (accreted price — no dirty/clean split for BTA)</text>
  <text x="410" y="187" fill="#64748b" font-size="10">Accreted Ask price (daily BtaPriceAccretionScheduler output)</text>
  <text x="814" y="187" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">.ask</text>
  <text x="410" y="201" fill="#64748b" font-size="10">Face value (nominal / redemption value)</text>
  <text x="814" y="201" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">.faceValue</text>
  <text x="410" y="215" fill="#64748b" font-size="10">Remaining gain (face − ask)</text>
  <text x="814" y="215" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">computed: faceValue − ask</text>
  <text x="410" y="229" fill="#64748b" font-size="10">Bid price</text>
  <text x="814" y="229" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">.bid</text>
  <text x="410" y="243" fill="#b45309" font-size="9">  ⓘ BTA ask price set daily by BtaPriceAccretionScheduler at 00:20 WAT.</text>
  <text x="410" y="256" fill="#b45309" font-size="9">  Formula: faceValue / (1 + impliedRate × daysToMaturity / 360)</text>

  <!-- Section: Bond Details Card -->
  <line x1="406" y1="272" x2="816" y2="272" stroke="#e2e8f0" stroke-width="1"/>
  <text x="408" y="284" fill="#1e3a5f" font-size="11" font-weight="700">Bond Details Card  (4-row grid)</text>
  <text x="410" y="300" fill="#64748b" font-size="10">Taux implicite (implied discount rate %)</text>
  <text x="814" y="300" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">computed: (faceValue/issuerPrice − 1) × (360/originalDays)</text>
  <text x="410" y="314" fill="#64748b" font-size="10">Prix nominal (face value)</text>
  <text x="814" y="314" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">.faceValue</text>
  <text x="410" y="328" fill="#64748b" font-size="10">Date de maturité</text>
  <text x="814" y="328" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">.maturityDate</text>
  <text x="410" y="342" fill="#64748b" font-size="10">Convention (day count)</text>
  <text x="814" y="342" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">.dayCountConvention  (hardcoded ACT/360 for BTA)</text>
  <text x="410" y="356" fill="#64748b" font-size="10">Jours restants (days to maturity)</text>
  <text x="814" y="356" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">computed: dayjs(maturityDate).diff(today, 'day')</text>
  <text x="410" y="370" fill="#64748b" font-size="10">Prix d'émission initial (issuer offer price)</text>
  <text x="814" y="370" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">.issuerPrice</text>
  <text x="410" y="384" fill="#64748b" font-size="10">Code ISIN</text>
  <text x="814" y="384" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">.isinCode</text>
  <text x="410" y="398" fill="#64748b" font-size="10">Émetteur</text>
  <text x="814" y="398" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">.issuerName</text>

  <!-- Section: Capital Gain Projection Card -->
  <line x1="406" y1="415" x2="816" y2="415" stroke="#e2e8f0" stroke-width="1"/>
  <text x="408" y="427" fill="#1e3a5f" font-size="11" font-weight="700">Capital Gain Projection Card  (replaces coupon table for BTA)</text>
  <text x="410" y="443" fill="#64748b" font-size="10">Gain brut / unité (face − current ask)</text>
  <text x="814" y="443" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">computed: faceValue − ask</text>
  <text x="410" y="457" fill="#64748b" font-size="10">IRCM retenu / unité</text>
  <text x="814" y="457" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">computed: (faceValue − ask) × taxConfig.ircmRate</text>
  <text x="410" y="471" fill="#64748b" font-size="10">Gain net / unité</text>
  <text x="814" y="471" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">computed: gainBrut − ircm</text>
  <text x="410" y="485" fill="#64748b" font-size="10">IRCM rate source</text>
  <text x="814" y="485" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">AssetPublicDetailResponse.taxConfig.ircmRate</text>

  <!-- Section: Action Button -->
  <line x1="406" y1="502" x2="816" y2="502" stroke="#e2e8f0" stroke-width="1"/>
  <text x="408" y="514" fill="#1e3a5f" font-size="11" font-weight="700">Action Button</text>
  <text x="410" y="530" fill="#64748b" font-size="10">"Acheter ce BTA" → navigates to screen 05c (BTA buy review)</text>
  <text x="814" y="530" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">hardcoded navigation — no API call at this point</text>

  <!-- Notes -->
  <line x1="406" y1="547" x2="816" y2="547" stroke="#e2e8f0" stroke-width="1"/>
  <text x="408" y="559" fill="#1e3a5f" font-size="11" font-weight="700">Notes</text>
  <text x="410" y="573" fill="#b45309" font-size="9">ⓘ BTA = Bon du Trésor Actualisé (zero-coupon discount bond). No coupons are paid.</text>
  <text x="410" y="586" fill="#b45309" font-size="9">ⓘ Unlike OTA, no accrued interest is shown. Price accretes daily toward faceValue.</text>
  <text x="410" y="599" fill="#b45309" font-size="9">ⓘ IRCM is NOT charged at purchase. It is deducted at maturity on capital gain.</text>
  <text x="410" y="612" fill="#b45309" font-size="9">ⓘ impliedRate = (faceValue / issuerPrice − 1) × (360 / originalTotalDays)</text>
  <text x="410" y="625" fill="#b45309" font-size="9">ⓘ originalTotalDays = dayjs(maturityDate).diff(issueDate, 'day').</text>
  <text x="410" y="638" fill="#b45309" font-size="9">ⓘ Screen 03b covers OTA coupon bonds; this screen (03c) is BTA-specific.</text>
</svg>
