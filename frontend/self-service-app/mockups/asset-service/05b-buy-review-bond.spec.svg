<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 984" width="820" height="984">
  <defs>
    <style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }</style>
  </defs>

  <!-- Left: mockup -->
  <image href="./05b-buy-review-bond.svg" x="0" y="0" width="390" height="984"/>

  <!-- Divider -->
  <line x1="397" y1="0" x2="397" y2="984" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Annotation panel -->
  <rect x="397" y="0" width="423" height="984" fill="#f8fafc"/>

  <!-- Title -->
  <text x="408" y="26" fill="#111827" font-size="13" font-weight="700">05b · Buy — Step 2 Review  (Bond / OTA)</text>

  <!-- Endpoints -->
  <rect x="406" y="31" width="265" height="15" rx="3" fill="#fff7ed"/>
  <text x="410" y="42" font-size="10" font-family="monospace"><tspan fill="#c2410c" font-weight="700">POST</tspan><tspan fill="#1e40af"> /trades/quote</tspan></text>
  <text x="408" y="57" fill="#64748b" font-size="9">result cached from Step 1 · QuoteResponse (bond fields populated)</text>

  <rect x="406" y="62" width="360" height="15" rx="3" fill="#fff7ed"/>
  <text x="410" y="73" font-size="10" font-family="monospace"><tspan fill="#c2410c" font-weight="700">POST</tspan><tspan fill="#1e40af"> /trades/orders/{orderId}/confirm</tspan></text>
  <text x="408" y="88" fill="#64748b" font-size="9">on "Confirm &amp; Buy Bond" tap · Response: OrderResponse</text>

  <!-- Section: Order Summary -->
  <line x1="406" y1="103" x2="816" y2="103" stroke="#e2e8f0" stroke-width="1"/>
  <text x="408" y="115" fill="#1e3a5f" font-size="11" font-weight="700">Order Summary Card  (bond-specific items)</text>
  <text x="410" y="131" fill="#64748b" font-size="10">Asset name (bond)</text>
  <text x="814" y="131" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">QuoteResponse.assetSymbol</text>
  <text x="410" y="145" fill="#64748b" font-size="10">Order type badge (BUY)</text>
  <text x="814" y="145" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">QuoteResponse.side</text>
  <text x="410" y="159" fill="#64748b" font-size="10">Units to buy</text>
  <text x="814" y="159" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">QuoteResponse.units</text>
  <text x="410" y="173" fill="#64748b" font-size="10">Ask price per unit  (dirty = clean + accrued)</text>
  <text x="814" y="173" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">QuoteResponse.executionPrice</text>
  <text x="410" y="187" fill="#64748b" font-size="10">Gross amount</text>
  <text x="814" y="187" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">QuoteResponse.grossAmount</text>
  <text x="410" y="201" fill="#64748b" font-size="10">Accrued interest  (paid to seller)</text>
  <text x="814" y="201" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">grossAmount − (cleanPrice × units)  (computed)</text>
  <text x="410" y="214" fill="#b45309" font-size="9">  cleanPrice = AssetPublicDetailResponse.askPrice (before accrued is added)</text>
  <text x="410" y="228" fill="#64748b" font-size="10">Trading fee (0.3%)</text>
  <text x="814" y="228" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">QuoteResponse.fee  (.feePercent)</text>
  <text x="410" y="242" fill="#64748b" font-size="10">IRCM tax  (tax on bond income)</text>
  <text x="814" y="242" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">QuoteResponse.taxBreakdown.capitalGainsTaxAmount</text>
  <text x="410" y="256" fill="#64748b" font-size="10">TVA (19.25% on fee)  — buyer only</text>
  <text x="814" y="256" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">fee × 0.1925  (BuyStrategy computed)</text>
  <text x="410" y="270" fill="#64748b" font-size="10">Total</text>
  <text x="814" y="270" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">QuoteResponse.netAmount</text>
  <text x="410" y="284" fill="#64748b" font-size="10">Available balance</text>
  <text x="814" y="284" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">QuoteResponse.availableBalance</text>

  <!-- Section: Investment Projection -->
  <line x1="406" y1="301" x2="816" y2="301" stroke="#e2e8f0" stroke-width="1"/>
  <text x="408" y="313" fill="#1e3a5f" font-size="11" font-weight="700">Investment Projection Card  (QuoteResponse.bondBenefit)</text>
  <text x="410" y="329" fill="#64748b" font-size="10">Est. annual coupon income</text>
  <text x="814" y="329" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">couponPerPeriod × (12 / couponFrequencyMonths)</text>
  <text x="410" y="343" fill="#64748b" font-size="10">Next coupon date &amp; amount</text>
  <text x="814" y="343" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">bondBenefit.nextCouponDate / .couponPerPeriod</text>
  <text x="410" y="357" fill="#64748b" font-size="10">Yield to maturity (YTM)</text>
  <text x="814" y="357" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">bondBenefit.annualizedYieldPercent</text>
  <text x="410" y="371" fill="#64748b" font-size="10">Principal at maturity &amp; date</text>
  <text x="814" y="371" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">bondBenefit.principalAtMaturity / .maturityDate</text>

  <!-- Section: Important Notes Block -->
  <line x1="406" y1="388" x2="816" y2="388" stroke="#e2e8f0" stroke-width="1"/>
  <text x="408" y="400" fill="#1e3a5f" font-size="11" font-weight="700">Important Notes Block</text>
  <text x="410" y="416" fill="#64748b" font-size="10">Price lock expiry (30 s)</text>
  <text x="814" y="416" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">QuoteResponse.quoteExpiresAt</text>
  <text x="410" y="430" fill="#64748b" font-size="10">Lock-up period after purchase</text>
  <text x="814" y="430" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">AssetPublicDetailResponse.lockupDays</text>

  <!-- Notes -->
  <line x1="406" y1="447" x2="816" y2="447" stroke="#e2e8f0" stroke-width="1"/>
  <text x="408" y="459" fill="#1e3a5f" font-size="11" font-weight="700">Notes</text>
  <text x="410" y="473" fill="#b45309" font-size="9">ⓘ executionPrice is the dirty price (cleanPrice + accrued interest per unit).</text>
  <text x="410" y="486" fill="#b45309" font-size="9">ⓘ IRCM = Impôt sur Revenus des Capitaux Mobiliers (bond income tax in Cameroon).</text>
  <text x="410" y="499" fill="#b45309" font-size="9">ⓘ bondBenefit is null for non-bond assets; use incomeBenefit for REIT/equity.</text>
  <text x="410" y="512" fill="#b45309" font-size="9">ⓘ TVA is buyer-only (SellStrategy does not add TVA on bond sells either).</text>
</svg>
