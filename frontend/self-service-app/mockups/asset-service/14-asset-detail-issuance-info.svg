  <text x="32" y="520" fill="#9ca3af" font-size="12">Total Supply</text>
  <text x="32" y="536" fill="#111827" font-size="13" font-weight="600">5,000,000 units</text>
  <text x="200" y="520" fill="#9ca3af" font-size="12">Available</text>
  <text x="200" y="536" fill="#111827" font-size="13" font-weight="600">1,960,000 units</text>
