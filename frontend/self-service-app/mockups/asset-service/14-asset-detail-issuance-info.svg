  <rect x="238" y="585" width="124" height="20" rx="10" fill="#e5e7eb"/>
  <text x="300" y="599" fill="#6b7280" font-size="11" text-anchor="middle">Reference only</text>
  <text x="32" y="622" fill="#6b7280" font-size="13">Original subscription start</text>
  <text x="358" y="622" fill="#374151" font-size="13" font-weight="600" text-anchor="end">Mar 1, 2026</text>
  <line x1="32" y1="632" x2="358" y2="632" stroke="#e5e7eb" stroke-width="1"/>
  <text x="32" y="650" fill="#6b7280" font-size="13">Original subscription end</text>
  <text x="358" y="650" fill="#374151" font-size="13" font-weight="600" text-anchor="end">Apr 30, 2026</text>
