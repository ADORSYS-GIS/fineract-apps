  <text x="32" y="548" fill="#111827" font-size="13" font-weight="600">10 units (78,000 XAF)</text>
  <text x="200" y="554" fill="#9ca3af" font-size="12">Lock-up Period</text>
  <text x="200" y="548" fill="#111827" font-size="13" font-weight="600">180 days</text>

  <!-- ★ ISSUANCE PERIOD — informational only, no action -->
  <rect x="16" y="574" width="358" height="86" rx="14" fill="#f8fafc" stroke="#e5e7eb" stroke-width="1" filter="url(#shadow)"/>
  <text x="32" y="598" fill="#374151" font-size="14" font-weight="600">📋  Issuance Period</text>
