  <text x="80" y="319" fill="#16a34a" font-size="12" font-weight="600" text-anchor="middle">▲ +0.9% today</text>
  <text x="260" y="266" fill="#6b7280" font-size="12" text-anchor="middle">Bid</text>
  <text x="340" y="266" fill="#6b7280" font-size="12" text-anchor="middle">Ask</text>
  <text x="260" y="288" fill="#10b981" font-size="15" font-weight="700" text-anchor="middle">7,720</text>
  <text x="340" y="288" fill="#ef4444" font-size="15" font-weight="700" text-anchor="middle">7,800</text>
  <line x1="245" y1="254" x2="245" y2="320" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Price Chart (abbreviated) -->
  <rect x="16" y="340" width="358" height="120" rx="14" fill="white" filter="url(#shadow)"/>
  <text x="32" y="364" fill="#111827" font-size="14" font-weight="600">Price History</text>
  <rect x="178" y="352" width="30" height="22" rx="11" fill="#1a56db"/>
  <text x="193" y="367" fill="white" font-size="11" font-weight="600" text-anchor="middle">1M</text>
  <text x="240" y="367" fill="#9ca3af" font-size="11" text-anchor="middle">3M</text>
  <text x="272" y="367" fill="#9ca3af" font-size="11" text-anchor="middle">1Y</text>
  <text x="304" y="367" fill="#9ca3af" font-size="11" text-anchor="middle">ALL</text>
  <rect x="28" y="378" width="334" height="68" rx="8" fill="#f8fafc"/>
  <polyline points="40,430 80,422 120,418 160,408 200,414 240,402 280,396 330,388 362,382" fill="none" stroke="#1a56db" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="40,430 80,422 120,418 160,408 200,414 240,402 280,396 330,388 362,382 362,446 40,446" fill="rgba(26,86,219,0.07)"/>
  <circle cx="362" cy="382" r="4" fill="#1a56db"/>

