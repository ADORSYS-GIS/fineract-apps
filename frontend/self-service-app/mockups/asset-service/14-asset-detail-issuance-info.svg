  <text x="32" y="652" fill="#9ca3af" font-size="11">ⓘ  Issuance period is for reference only. Trading is open.</text>

  <!-- Income Info -->
  <rect x="16" y="672" width="358" height="58" rx="14" fill="#eff6ff" filter="url(#shadow)"/>
  <text x="32" y="696" fill="#1e40af" font-size="14" font-weight="600">💰 Income Type</text>
  <text x="32" y="714" fill="#1d4ed8" font-size="13">Rent · 5.8% p.a. · Quarterly · Next: Jul 1, 2026</text>

  <!-- Action Buttons — fully enabled regardless of issuance period -->
  <rect x="16" y="742" width="172" height="52" rx="12" fill="#1a56db" filter="url(#shadow)"/>
  <text x="102" y="773" fill="white" font-size="16" font-weight="700" text-anchor="middle">📈  Buy</text>
  <rect x="202" y="742" width="172" height="52" rx="12" fill="white" stroke="#1a56db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="288" y="773" fill="#1a56db" font-size="16" font-weight="700" text-anchor="middle">📉  Sell</text>

  <!-- Bottom Nav -->
  <rect x="0" y="796" width="390" height="48" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <text x="48" y="826" fill="#9ca3af" font-size="10" text-anchor="middle">🏠 Home</text>
  <text x="146" y="826" fill="#1a56db" font-size="10" text-anchor="middle" font-weight="600">📊 Market</text>
  <text x="244" y="826" fill="#9ca3af" font-size="10" text-anchor="middle">💼 Portfolio</text>
  <text x="342" y="826" fill="#9ca3af" font-size="10" text-anchor="middle">📋 History</text>
