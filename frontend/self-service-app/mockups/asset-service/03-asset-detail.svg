<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 920" width="390" height="920">
  <defs>
    <style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }</style>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#00000018"/></filter>
  </defs>

  <!-- Background -->
  <rect width="390" height="920" fill="#f3f4f6"/>

  <!-- Status Bar -->
  <rect width="390" height="44" fill="#1a56db"/>
  <text x="20" y="28" fill="white" font-size="13" font-weight="600">9:41</text>
  <text x="340" y="28" fill="white" font-size="11">▐▐▐ 🔋</text>

  <!-- Header -->
  <rect width="390" height="76" y="44" fill="#1a56db"/>
  <text x="36" y="90" fill="white" font-size="20">←</text>
  <text x="195" y="90" fill="white" font-size="18" font-weight="700" text-anchor="middle">Asset Detail</text>
  <text x="362" y="90" fill="white" font-size="18">♡</text>

  <!-- Asset Header Card -->
  <rect x="16" y="132" width="358" height="120" rx="14" fill="white" filter="url(#shadow)"/>
  <circle cx="56" cy="184" r="28" fill="#fef3c7"/>
  <text x="56" y="193" fill="#d97706" font-size="26" text-anchor="middle">🏠</text>
  <text x="96" y="166" fill="#111827" font-size="18" font-weight="700">Immo Plus</text>
  <text x="96" y="184" fill="#9ca3af" font-size="13">IMMO · Real Estate</text>
  <!-- Active badge -->
  <rect x="96" y="193" width="58" height="20" rx="10" fill="#dcfce7"/>
  <text x="125" y="207" fill="#16a34a" font-size="11" font-weight="600" text-anchor="middle">● Active</text>
  <!-- Lock-up badge -->
  <text x="96" y="238" fill="#9ca3af" font-size="11">🔒 Lock-up: 90 days</text>
  <!-- NOTE: for BONDS, show bond-type badge (see 03b-bond-asset-detail.svg) -->
  <rect x="248" y="193" width="110" height="20" rx="10" fill="#ede9fe"/>
  <text x="303" y="207" fill="#7c3aed" font-size="10" font-weight="600" text-anchor="middle">BONDS: OTA · Coupon</text>

  <!-- Price Block -->
  <rect x="16" y="262" width="358" height="100" rx="14" fill="white" filter="url(#shadow)"/>
  <text x="32" y="288" fill="#6b7280" font-size="13">Ask Price (Buy at)</text>
  <text x="32" y="318" fill="#111827" font-size="28" font-weight="700">5,200 XAF</text>
  <rect x="32" y="326" width="96" height="22" rx="11" fill="#dcfce7"/>
  <text x="80" y="341" fill="#16a34a" font-size="12" font-weight="600" text-anchor="middle">▲ +1.8% today</text>
  <!-- Bid / Ask / OHLC -->
  <line x1="245" y1="275" x2="245" y2="355" stroke="#e5e7eb" stroke-width="1"/>
  <text x="270" y="288" fill="#6b7280" font-size="12">Bid</text>
  <text x="350" y="288" fill="#6b7280" font-size="12">Ask</text>
  <text x="270" y="308" fill="#10b981" font-size="15" font-weight="700">5,100</text>
  <text x="350" y="308" fill="#ef4444" font-size="15" font-weight="700">5,200</text>
  <text x="270" y="330" fill="#9ca3af" font-size="11">H: 5,250</text>
  <text x="350" y="330" fill="#9ca3af" font-size="11">L: 5,050</text>
  <text x="270" y="348" fill="#9ca3af" font-size="11">Vol: 1.2M</text>

  <!-- Price Chart -->
  <rect x="16" y="372" width="358" height="152" rx="14" fill="white" filter="url(#shadow)"/>
  <text x="32" y="396" fill="#111827" font-size="14" font-weight="600">Price History</text>
  <!-- Period tabs -->
  <rect x="178" y="384" width="30" height="22" rx="11" fill="#1a56db"/>
  <text x="193" y="399" fill="white" font-size="11" font-weight="600" text-anchor="middle">1M</text>
  <text x="240" y="399" fill="#9ca3af" font-size="11" text-anchor="middle">3M</text>
  <text x="272" y="399" fill="#9ca3af" font-size="11" text-anchor="middle">1Y</text>
  <text x="304" y="399" fill="#9ca3af" font-size="11" text-anchor="middle">ALL</text>
  <text x="148" y="399" fill="#9ca3af" font-size="11" text-anchor="middle">1W</text>
  <text x="116" y="399" fill="#9ca3af" font-size="11" text-anchor="middle">1D</text>
  <!-- Chart area -->
  <rect x="28" y="410" width="334" height="90" rx="8" fill="#f8fafc"/>
  <text x="34" y="424" fill="#9ca3af" font-size="10">5,300</text>
  <text x="34" y="458" fill="#9ca3af" font-size="10">5,100</text>
  <text x="34" y="493" fill="#9ca3af" font-size="10">4,900</text>
  <polyline points="68,490 100,480 130,470 160,465 190,475 220,460 250,450 280,442 310,438 340,432 355,428" fill="none" stroke="#1a56db" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="68,490 100,480 130,470 160,465 190,475 220,460 250,450 280,442 310,438 340,432 355,428 355,500 68,500" fill="rgba(26,86,219,0.08)"/>
  <circle cx="355" cy="428" r="4" fill="#1a56db"/>
  <text x="68" y="508" fill="#9ca3af" font-size="10" text-anchor="middle">Feb 15</text>
  <text x="210" y="508" fill="#9ca3af" font-size="10" text-anchor="middle">Mar 1</text>
  <text x="355" y="508" fill="#9ca3af" font-size="10" text-anchor="middle">Apr 9</text>

  <!-- Key Stats — 4 stats (swapped Income Type for bond fields when category=BONDS) -->
  <rect x="16" y="534" width="358" height="116" rx="14" fill="white" filter="url(#shadow)"/>
  <text x="32" y="558" fill="#111827" font-size="14" font-weight="600">Key Statistics</text>
  <!-- Row 1 -->
  <text x="32" y="580" fill="#9ca3af" font-size="12">Total Supply</text>
  <text x="32" y="596" fill="#111827" font-size="13" font-weight="600">10,000,000 units</text>
  <text x="200" y="580" fill="#9ca3af" font-size="12">Available</text>
  <text x="200" y="596" fill="#111827" font-size="13" font-weight="600">3,450,000 units</text>
  <line x1="16" y1="604" x2="374" y2="604" stroke="#f3f4f6" stroke-width="1"/>
  <!-- Row 2: show Maturity + Income for bond variant; Income Type for non-bond -->
  <text x="32" y="620" fill="#9ca3af" font-size="12">Min. Order</text>
  <text x="32" y="636" fill="#111827" font-size="13" font-weight="600">5,200 XAF</text>
  <text x="200" y="620" fill="#9ca3af" font-size="12">Income Type</text>
  <text x="200" y="636" fill="#111827" font-size="13" font-weight="600">🏠 Rent · 5.2% p.a.</text>
  <!-- Bond override annotation (dashed) -->
  <rect x="196" y="608" width="170" height="38" rx="6" fill="none" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="200" y="620" fill="#7c3aed" font-size="10">BOND: Maturity</text>
  <text x="200" y="632" fill="#7c3aed" font-size="11" font-weight="600">Oct 2034 · 7.5% p.a.</text>

  <!-- Income / Coupon Info — shows coupon for bonds -->
  <rect x="16" y="660" width="358" height="72" rx="14" fill="#eff6ff" filter="url(#shadow)"/>
  <text x="32" y="682" fill="#1e40af" font-size="14" font-weight="600">💰 Next Income Payment</text>
  <text x="32" y="700" fill="#1d4ed8" font-size="13">Apr 01, 2026</text>
  <text x="32" y="716" fill="#1d4ed8" font-size="12">Est. 270 XAF/unit · Quarterly distribution</text>
  <!-- Bond override annotation (dashed) -->
  <rect x="16" y="660" width="358" height="72" rx="14" fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="195" y="726" fill="#7c3aed" font-size="10" text-anchor="middle">BOND: "325 XAF accrued today · Next coupon Apr 1 (375 XAF)"</text>

  <!-- Action Buttons -->
  <rect x="16" y="820" width="172" height="52" rx="12" fill="#1a56db" filter="url(#shadow)"/>
  <text x="102" y="851" fill="white" font-size="16" font-weight="700" text-anchor="middle">📈  Buy</text>
  <rect x="202" y="820" width="172" height="52" rx="12" fill="white" stroke="#1a56db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="288" y="851" fill="#1a56db" font-size="16" font-weight="700" text-anchor="middle">📉  Sell</text>

  <!-- Bottom Nav -->
  <rect x="0" y="872" width="390" height="48" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <text x="48" y="902" fill="#9ca3af" font-size="10" text-anchor="middle">🏠 Home</text>
  <text x="146" y="902" fill="#1a56db" font-size="10" text-anchor="middle" font-weight="600">📊 Market</text>
  <text x="244" y="902" fill="#9ca3af" font-size="10" text-anchor="middle">💼 Portfolio</text>
  <text x="342" y="902" fill="#9ca3af" font-size="10" text-anchor="middle">📋 History</text>
</svg>
