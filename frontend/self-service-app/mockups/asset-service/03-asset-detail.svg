  <!-- X axis labels -->
  <text x="68" y="510" fill="#9ca3af" font-size="10" text-anchor="middle">Feb 15</text>
  <text x="210" y="510" fill="#9ca3af" font-size="10" text-anchor="middle">Mar 1</text>
  <text x="355" y="510" fill="#9ca3af" font-size="10" text-anchor="middle">Mar 17</text>

