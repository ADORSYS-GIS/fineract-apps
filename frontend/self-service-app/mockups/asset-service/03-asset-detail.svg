  <rect x="16" y="648" width="358" height="70" rx="14" fill="#eff6ff" filter="url(#shadow)"/>
  <text x="32" y="672" fill="#1e40af" font-size="14" font-weight="600">💰 Next Income Payment</text>
  <text x="32" y="692" fill="#1d4ed8" font-size="13">Apr 01, 2026</text>
  <text x="32" y="708" fill="#1d4ed8" font-size="12">Est. 270 XAF/unit · Quarterly distribution</text>

  <!-- Action Buttons -->
  <rect x="16" y="730" width="172" height="52" rx="12" fill="#1a56db" filter="url(#shadow)"/>
  <text x="102" y="761" fill="white" font-size="16" font-weight="700" text-anchor="middle">📈  Buy</text>
  <rect x="202" y="730" width="172" height="52" rx="12" fill="white" stroke="#1a56db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="288" y="761" fill="#1a56db" font-size="16" font-weight="700" text-anchor="middle">📉  Sell</text>

  <!-- Bottom Nav -->
  <rect x="0" y="796" width="390" height="48" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <text x="48" y="826" fill="#9ca3af" font-size="10" text-anchor="middle">🏠 Home</text>
  <text x="146" y="826" fill="#1a56db" font-size="10" text-anchor="middle" font-weight="600">📊 Market</text>
  <text x="244" y="826" fill="#9ca3af" font-size="10" text-anchor="middle">💼 Portfolio</text>
  <text x="342" y="826" fill="#9ca3af" font-size="10" text-anchor="middle">📋 History</text>
