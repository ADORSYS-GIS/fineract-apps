  <text x="362" y="90" fill="white" font-size="18">♡</text>

  <!-- Asset Header Card -->
  <rect x="16" y="132" width="358" height="110" rx="14" fill="white" filter="url(#shadow)"/>
  <circle cx="56" cy="182" r="28" fill="#fef3c7"/>
  <text x="56" y="191" fill="#d97706" font-size="26" text-anchor="middle">🏠</text>
  <text x="96" y="166" fill="#111827" font-size="18" font-weight="700">Immo Plus</text>
  <text x="96" y="184" fill="#9ca3af" font-size="13">IMMO · Real Estate</text>
  <rect x="96" y="193" width="58" height="20" rx="10" fill="#dcfce7"/>
