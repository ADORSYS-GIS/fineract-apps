  <text x="340" y="278" fill="#6b7280" font-size="12" text-anchor="middle">Ask</text>
  <text x="260" y="298" fill="#10b981" font-size="15" font-weight="700" text-anchor="middle">5,100</text>
  <text x="340" y="298" fill="#ef4444" font-size="15" font-weight="700" text-anchor="middle">5,200</text>
