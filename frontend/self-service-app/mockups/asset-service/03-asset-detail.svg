  <rect x="16" y="532" width="358" height="106" rx="14" fill="white" filter="url(#shadow)"/>
  <text x="32" y="556" fill="#111827" font-size="14" font-weight="600">Key Statistics</text>
  <!-- Stat grid 2x3 -->
  <text x="32" y="578" fill="#9ca3af" font-size="12">Total Supply</text>
  <text x="32" y="594" fill="#111827" font-size="13" font-weight="600">10,000,000 units</text>
  <text x="200" y="578" fill="#9ca3af" font-size="12">Available</text>
  <text x="200" y="594" fill="#111827" font-size="13" font-weight="600">3,450,000 units</text>
  <text x="32" y="616" fill="#9ca3af" font-size="12">Min. Order</text>
  <text x="32" y="632" fill="#111827" font-size="13" font-weight="600">5,200 XAF</text>
  <text x="200" y="616" fill="#9ca3af" font-size="12">Income Type</text>
  <text x="200" y="632" fill="#111827" font-size="13" font-weight="600">🏠 Rent · 5.2% p.a.</text>
  <line x1="16" y1="600" x2="374" y2="600" stroke="#f3f4f6" stroke-width="1"/>

