  <text x="260" y="320" fill="#9ca3af" font-size="11" text-anchor="middle">H: 5,250</text>
  <text x="340" y="320" fill="#9ca3af" font-size="11" text-anchor="middle">L: 5,050</text>
  <text x="260" y="338" fill="#9ca3af" font-size="11" text-anchor="middle">Open: 5,100</text>
  <text x="340" y="338" fill="#9ca3af" font-size="11" text-anchor="middle">Vol: 1.2M</text>

