  <text x="34" y="415" fill="#9ca3af" font-size="10">5,300</text>
  <text x="34" y="450" fill="#9ca3af" font-size="10">5,100</text>
  <text x="34" y="492" fill="#9ca3af" font-size="10">4,900</text>
  <!-- Chart line (price chart approximation) -->
  <polyline points="68,490 100,480 130,470 160,465 190,475 220,460 250,450 280,442 310,438 340,432 355,428" fill="none" stroke="#1a56db" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Fill area under line -->
  <polygon points="68,490 100,480 130,470 160,465 190,475 220,460 250,450 280,442 310,438 340,432 355,428 355,500 68,500" fill="rgba(26,86,219,0.08)"/>
  <!-- Dot at end -->
