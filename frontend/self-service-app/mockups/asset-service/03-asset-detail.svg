  <text x="240" y="389" fill="#9ca3af" font-size="11" text-anchor="middle">3M</text>
  <text x="272" y="389" fill="#9ca3af" font-size="11" text-anchor="middle">1Y</text>
  <text x="304" y="389" fill="#9ca3af" font-size="11" text-anchor="middle">ALL</text>
  <text x="148" y="389" fill="#9ca3af" font-size="11" text-anchor="middle">1W</text>
  <text x="116" y="389" fill="#9ca3af" font-size="11" text-anchor="middle">1D</text>
