<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 748" width="390" height="748">
  <defs>
    <style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }</style>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#00000018"/></filter>
  </defs>

  <!-- Background -->
  <rect width="390" height="748" fill="#f3f4f6"/>

  <!-- Status Bar -->
  <rect width="390" height="44" fill="#1a56db"/>
  <text x="20" y="28" fill="white" font-size="13" font-weight="600">9:41</text>
  <text x="340" y="28" fill="white" font-size="11">▐▐▐ 🔋</text>

  <!-- Header -->
  <rect width="390" height="76" y="44" fill="#1a56db"/>
  <text x="195" y="90" fill="white" font-size="18" font-weight="700" text-anchor="middle">Remboursement à maturité</text>

  <!-- Success Banner -->
  <rect x="16" y="132" width="358" height="72" rx="14" fill="#dcfce7" filter="url(#shadow)"/>
  <text x="195" y="160" fill="#15803d" font-size="28" text-anchor="middle">✓</text>
  <text x="195" y="180" fill="#15803d" font-size="14" font-weight="700" text-anchor="middle">Votre obligation BTA a été remboursée</text>
  <text x="195" y="196" fill="#166534" font-size="12" text-anchor="middle">Le 15 avril 2027</text>

  <!-- Redemption Summary Card -->
  <rect x="16" y="216" width="358" height="348" rx="14" fill="white" filter="url(#shadow)"/>

  <!-- Bond identity -->
  <circle cx="46" cy="250" r="20" fill="#ede9fe"/>
  <text x="46" y="257" fill="#7c3aed" font-size="16" text-anchor="middle">📉</text>
  <text x="76" y="244" fill="#111827" font-size="15" font-weight="700">BTA 2Y 2027</text>
  <rect x="76" y="250" width="124" height="20" rx="10" fill="#ede9fe"/>
  <text x="138" y="264" fill="#7c3aed" font-size="11" font-weight="600" text-anchor="middle">BTA · Remboursement</text>

  <line x1="32" y1="282" x2="358" y2="282" stroke="#f3f4f6" stroke-width="1"/>

  <!-- Row: units redeemed -->
  <text x="32" y="302" fill="#6b7280" font-size="13">Unités remboursées</text>
  <text x="358" y="302" fill="#111827" font-size="14" font-weight="700" text-anchor="end">200 unités</text>

  <line x1="32" y1="316" x2="358" y2="316" stroke="#f3f4f6" stroke-width="1"/>

  <!-- Row: face value per unit -->
  <text x="32" y="336" fill="#6b7280" font-size="13">Valeur nominale / unité</text>
  <text x="358" y="336" fill="#111827" font-size="14" text-anchor="end">10,000 XAF</text>

  <line x1="32" y1="350" x2="358" y2="350" stroke="#f3f4f6" stroke-width="1"/>

  <!-- Row: gross proceeds -->
  <text x="32" y="370" fill="#6b7280" font-size="13">Produit brut (200 × 10,000)</text>
  <text x="358" y="370" fill="#111827" font-size="14" font-weight="600" text-anchor="end">2,000,000 XAF</text>

  <line x1="32" y1="384" x2="358" y2="384" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- Row: avg purchase price -->
  <text x="32" y="404" fill="#6b7280" font-size="13">Prix d'achat moyen / unité</text>
  <text x="358" y="404" fill="#111827" font-size="13" text-anchor="end">9,268 XAF</text>

  <line x1="32" y1="418" x2="358" y2="418" stroke="#f3f4f6" stroke-width="1"/>

  <!-- Row: capital gain -->
  <text x="32" y="438" fill="#6b7280" font-size="13">Gain en capital brut</text>
  <text x="32" y="452" fill="#9ca3af" font-size="10">200 × (10,000 − 9,268)</text>
  <text x="358" y="438" fill="#1d4ed8" font-size="14" font-weight="600" text-anchor="end">146,400 XAF</text>

  <line x1="32" y1="464" x2="358" y2="464" stroke="#f3f4f6" stroke-width="1"/>

  <!-- Row: IRCM withheld (red) -->
  <text x="32" y="484" fill="#6b7280" font-size="13">IRCM retenu (16.5%)</text>
  <text x="32" y="498" fill="#9ca3af" font-size="10">Prélevé automatiquement à maturité</text>
  <text x="358" y="484" fill="#ef4444" font-size="14" font-weight="600" text-anchor="end">−24,156 XAF</text>

  <!-- Total divider -->
  <line x1="16" y1="512" x2="374" y2="512" stroke="#15803d" stroke-width="2"/>
  <text x="32" y="536" fill="#111827" font-size="14" font-weight="700">Produit net crédité</text>
  <text x="358" y="536" fill="#15803d" font-size="22" font-weight="700" text-anchor="end">1,975,844 XAF</text>
  <text x="358" y="554" fill="#6b7280" font-size="12" text-anchor="end">ISIN: CM0000654321</text>

  <!-- Wallet notice -->
  <rect x="16" y="576" width="358" height="56" rx="12" fill="#eff6ff" filter="url(#shadow)"/>
  <text x="32" y="600" fill="#1e40af" font-size="13" font-weight="600">🏦 Montant crédité sur votre portefeuille</text>
  <text x="32" y="618" fill="#1d4ed8" font-size="12">1,975,844 XAF ont été ajoutés à votre solde Fineract</text>

  <!-- Back to portfolio button -->
  <rect x="16" y="644" width="358" height="52" rx="14" fill="#1a56db" filter="url(#shadow)"/>
  <text x="195" y="675" fill="white" font-size="16" font-weight="700" text-anchor="middle">💼  Voir mon portefeuille</text>

  <!-- Bottom Nav -->
  <rect x="0" y="700" width="390" height="48" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <text x="48" y="730" fill="#9ca3af" font-size="10" text-anchor="middle">🏠 Home</text>
  <text x="146" y="730" fill="#9ca3af" font-size="10" text-anchor="middle">📊 Market</text>
  <text x="244" y="730" fill="#1a56db" font-size="10" text-anchor="middle" font-weight="600">💼 Portfolio</text>
  <text x="342" y="730" fill="#9ca3af" font-size="10" text-anchor="middle">📋 History</text>
</svg>
