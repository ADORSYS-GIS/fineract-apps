  <text x="358" y="750" fill="#ef4444" font-size="11" font-weight="600" text-anchor="end">IRCM: −354 XAF/unité</text>
  <text x="358" y="766" fill="#16a34a" font-size="11" font-weight="600" text-anchor="end">net: 1,792 XAF/unité</text>

