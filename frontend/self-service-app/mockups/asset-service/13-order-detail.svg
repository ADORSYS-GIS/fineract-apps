  <text x="66" y="265" fill="#111827" font-size="13" font-weight="600">Submitted</text>
  <text x="66" y="280" fill="#9ca3af" font-size="11">Mar 15 · 14:20:03</text>
  <!-- Connector -->
  <line x1="48" y1="278" x2="48" y2="298" stroke="#16a34a" stroke-width="2" stroke-dasharray="2,2"/>
  <!-- Step 2 - Processing -->
  <circle cx="48" cy="298" r="10" fill="#16a34a"/>
  <text x="48" y="303" fill="white" font-size="10" font-weight="700" text-anchor="middle">✓</text>
  <text x="66" y="295" fill="#111827" font-size="13" font-weight="600">Processing</text>
  <text x="66" y="310" fill="#9ca3af" font-size="11">Mar 15 · 14:21:45</text>
  <!-- Connector -->
  <line x1="48" y1="308" x2="48" y2="326" stroke="#16a34a" stroke-width="2" stroke-dasharray="2,2"/>
  <!-- Step 3 - Completed -->
  <circle cx="48" cy="326" r="10" fill="#16a34a"/>
  <text x="48" y="331" fill="white" font-size="10" font-weight="700" text-anchor="middle">✓</text>
  <text x="66" y="323" fill="#111827" font-size="13" font-weight="600">Completed</text>
  <text x="66" y="338" fill="#9ca3af" font-size="11">Mar 15 · 14:25:10</text>

