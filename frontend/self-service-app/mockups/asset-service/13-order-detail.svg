  <text x="358" y="534" fill="#111827" font-size="13" text-anchor="end">1,000 XAF</text>
  <line x1="32" y1="544" x2="358" y2="544" stroke="#f3f4f6" stroke-width="1"/>

  <text x="32" y="568" fill="#6b7280" font-size="13">Subtotal</text>
  <text x="358" y="568" fill="#111827" font-size="13" text-anchor="end">500,000 XAF</text>
  <line x1="32" y1="578" x2="358" y2="578" stroke="#f3f4f6" stroke-width="1"/>

  <text x="32" y="602" fill="#6b7280" font-size="13">Trading fee (0.5%)</text>
  <text x="358" y="602" fill="#ef4444" font-size="13" text-anchor="end">+2,500 XAF</text>
  <line x1="32" y1="612" x2="358" y2="612" stroke="#e5e7eb" stroke-width="2"/>

  <text x="32" y="638" fill="#111827" font-size="15" font-weight="700">Total paid</text>
  <text x="358" y="638" fill="#1a56db" font-size="18" font-weight="700" text-anchor="end">502,500 XAF</text>

  <!-- Lock-up info (BUY specific) -->
