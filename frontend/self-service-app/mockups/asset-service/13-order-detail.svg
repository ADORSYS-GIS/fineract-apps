  <circle cx="50" cy="388" r="22" fill="#fce7f3"/>
  <text x="50" y="395" fill="#db2777" font-size="20" text-anchor="middle">📄</text>
  <text x="82" y="376" fill="#111827" font-size="15" font-weight="700">AgriCam Bond 2026</text>
