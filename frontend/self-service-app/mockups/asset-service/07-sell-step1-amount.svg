<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844">
  <defs>
    <style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }</style>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#00000018"/></filter>
  </defs>

  <!-- Background -->
  <rect width="390" height="844" fill="#f3f4f6"/>

  <!-- Status Bar -->
  <rect width="390" height="44" fill="#ef4444"/>
  <text x="20" y="28" fill="white" font-size="13" font-weight="600">9:41</text>
  <text x="340" y="28" fill="white" font-size="11">▐▐▐ 🔋</text>

  <!-- Header -->
  <rect width="390" height="76" y="44" fill="#ef4444"/>
  <text x="36" y="90" fill="white" font-size="20">←</text>
  <text x="195" y="90" fill="white" font-size="18" font-weight="700" text-anchor="middle">Sell Asset</text>

  <!-- Step Progress Bar -->
  <rect x="16" y="132" width="358" height="6" rx="3" fill="#fecaca"/>
  <rect x="16" y="132" width="120" height="6" rx="3" fill="#ef4444"/>
  <text x="16" y="154" fill="#ef4444" font-size="12" font-weight="600">Step 1 of 3 · Select Units</text>

  <!-- Asset Info -->
  <rect x="16" y="166" width="358" height="72" rx="14" fill="white" filter="url(#shadow)"/>
  <circle cx="50" cy="202" r="20" fill="#fef3c7"/>
  <text x="50" y="209" fill="#d97706" font-size="18" text-anchor="middle">🏠</text>
  <text x="80" y="194" fill="#111827" font-size="15" font-weight="700">Immo Plus</text>
  <text x="80" y="212" fill="#9ca3af" font-size="12">IMMO · Real Estate</text>
  <text x="358" y="194" fill="#111827" font-size="15" font-weight="700" text-anchor="end">5,100 XAF/unit</text>
  <text x="358" y="212" fill="#6b7280" font-size="12" text-anchor="end">Bid price</text>

  <!-- Holdings -->
  <rect x="16" y="250" width="358" height="70" rx="12" fill="#fef2f2"/>
  <text x="32" y="274" fill="#dc2626" font-size="13" font-weight="600">Your Holdings</text>
  <text x="358" y="274" fill="#dc2626" font-size="16" font-weight="700" text-anchor="end">10 units</text>
  <text x="32" y="296" fill="#9ca3af" font-size="12">Total value at bid price</text>
  <text x="358" y="296" fill="#6b7280" font-size="13" font-weight="600" text-anchor="end">51,000 XAF</text>
  <text x="32" y="312" fill="#9ca3af" font-size="11">🔒 Lock-up ends: Jun 14, 2026 · 89 days remaining</text>

  <!-- Lock up warning -->
  <rect x="16" y="332" width="358" height="44" rx="10" fill="#fffbeb"/>
  <text x="32" y="350" fill="#92400e" font-size="12" font-weight="600">⚠️ Lock-up period active</text>
  <text x="32" y="366" fill="#92400e" font-size="12">Units purchased within 90 days cannot be sold.</text>

  <!-- Units Input -->
  <text x="20" y="404" fill="#374151" font-size="13" font-weight="600">Units to sell</text>
  <rect x="16" y="414" width="358" height="62" rx="12" fill="white" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <text x="32" y="452" fill="#111827" font-size="28" font-weight="700">5</text>
  <text x="334" y="452" fill="#6b7280" font-size="16">units</text>
  <line x1="32" y1="458" x2="80" y2="458" stroke="#ef4444" stroke-width="2"/>

  <!-- Quick select % buttons -->
  <text x="20" y="500" fill="#6b7280" font-size="12">Sell portion</text>
  <rect x="16" y="508" width="78" height="32" rx="10" fill="#fecaca"/>
  <text x="55" y="528" fill="#dc2626" font-size="12" font-weight="600" text-anchor="middle">25%</text>
  <rect x="102" y="508" width="78" height="32" rx="10" fill="#fecaca"/>
  <text x="141" y="528" fill="#dc2626" font-size="12" font-weight="600" text-anchor="middle">50%</text>
  <rect x="188" y="508" width="78" height="32" rx="10" fill="#ef4444"/>
  <text x="227" y="528" fill="white" font-size="12" font-weight="600" text-anchor="middle">75%</text>
  <rect x="274" y="508" width="80" height="32" rx="10" fill="#fecaca"/>
  <text x="314" y="528" fill="#dc2626" font-size="12" font-weight="600" text-anchor="middle">All</text>

  <!-- Slider track -->
  <rect x="16" y="556" width="358" height="6" rx="3" fill="#fecaca"/>
  <rect x="16" y="556" width="270" height="6" rx="3" fill="#ef4444"/>
  <circle cx="286" cy="559" r="12" fill="white" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <text x="286" y="564" fill="#ef4444" font-size="9" font-weight="700" text-anchor="middle">75%</text>

  <!-- Proceed estimate -->
  <rect x="16" y="582" width="358" height="120" rx="14" fill="white" filter="url(#shadow)"/>
  <text x="32" y="606" fill="#111827" font-size="14" font-weight="600">Estimated Proceeds</text>
  <line x1="32" y1="616" x2="358" y2="616" stroke="#f3f4f6" stroke-width="1"/>
  <text x="32" y="640" fill="#6b7280" font-size="13">Units to sell</text>
  <text x="358" y="640" fill="#111827" font-size="13" font-weight="600" text-anchor="end">5 units</text>
  <line x1="32" y1="650" x2="358" y2="650" stroke="#f3f4f6" stroke-width="1"/>
  <text x="32" y="674" fill="#6b7280" font-size="13">Bid price per unit</text>
  <text x="358" y="674" fill="#111827" font-size="13" text-anchor="end">5,100 XAF</text>
  <line x1="32" y1="684" x2="358" y2="684" stroke="#f3f4f6" stroke-width="1"/>
  <text x="32" y="698" fill="#6b7280" font-size="13">Trading fee (0.5%)</text>
  <text x="358" y="698" fill="#ef4444" font-size="13" text-anchor="end">-127.50 XAF</text>

  <!-- Net proceeds -->
  <rect x="16" y="714" width="358" height="46" rx="12" fill="#fef2f2"/>
  <text x="32" y="742" fill="#dc2626" font-size="14" font-weight="600">Net Proceeds</text>
  <text x="358" y="742" fill="#dc2626" font-size="18" font-weight="700" text-anchor="end">25,372.50 XAF</text>

  <!-- Continue Button -->
  <rect x="16" y="772" width="358" height="52" rx="14" fill="#ef4444" filter="url(#shadow)"/>
  <text x="195" y="803" fill="white" font-size="16" font-weight="700" text-anchor="middle">Continue →</text>

  <!-- Bottom Nav -->
  <rect x="0" y="796" width="390" height="48" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <text x="48" y="826" fill="#9ca3af" font-size="10" text-anchor="middle">🏠 Home</text>
  <text x="146" y="826" fill="#9ca3af" font-size="10" text-anchor="middle">📊 Market</text>
  <text x="244" y="826" fill="#ef4444" font-size="10" text-anchor="middle" font-weight="600">💼 Portfolio</text>
  <text x="342" y="826" fill="#9ca3af" font-size="10" text-anchor="middle">📋 History</text>
</svg>
