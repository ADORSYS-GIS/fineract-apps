<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844">
  <defs>
    <style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }</style>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#00000018"/></filter>
  </defs>

  <!-- Background -->
  <rect width="390" height="844" fill="#f3f4f6"/>

  <!-- Status Bar -->
  <rect width="390" height="44" fill="#1a56db"/>
  <text x="20" y="28" fill="white" font-size="13" font-weight="600">9:41</text>
  <text x="340" y="28" fill="white" font-size="11">▐▐▐ 🔋</text>

  <!-- Header -->
  <rect width="390" height="76" y="44" fill="#1a56db"/>
  <text x="36" y="90" fill="white" font-size="20">←</text>
  <text x="195" y="90" fill="white" font-size="18" font-weight="700" text-anchor="middle">Buy Asset</text>

  <!-- Step Progress Bar -->
  <rect x="16" y="132" width="358" height="6" rx="3" fill="#e5e7eb"/>
  <rect x="16" y="132" width="120" height="6" rx="3" fill="#1a56db"/>
  <text x="16" y="154" fill="#1a56db" font-size="12" font-weight="600">Step 1 of 3 · Enter Amount</text>

  <!-- Asset Info -->
  <rect x="16" y="166" width="358" height="72" rx="14" fill="white" filter="url(#shadow)"/>
  <circle cx="50" cy="202" r="20" fill="#fef3c7"/>
  <text x="50" y="209" fill="#d97706" font-size="18" text-anchor="middle">🏠</text>
  <text x="80" y="194" fill="#111827" font-size="15" font-weight="700">Immo Plus</text>
  <text x="80" y="212" fill="#9ca3af" font-size="12">IMMO · Real Estate</text>
  <text x="358" y="194" fill="#111827" font-size="15" font-weight="700" text-anchor="end">5,200 XAF/unit</text>
  <text x="358" y="212" fill="#10b981" font-size="12" text-anchor="end">▲ +1.8%</text>

  <!-- Available Balance -->
  <rect x="16" y="250" width="358" height="56" rx="12" fill="#eff6ff"/>
  <text x="32" y="274" fill="#1e40af" font-size="13">Available Balance</text>
  <text x="358" y="274" fill="#1e40af" font-size="16" font-weight="700" text-anchor="end">850,000 XAF</text>
  <text x="32" y="294" fill="#6b7280" font-size="11">Your wallet · Updated just now</text>

  <!-- Input Mode Toggle — "Number of Units" is now active -->
  <rect x="16" y="320" width="358" height="44" rx="12" fill="#e5e7eb"/>
  <text x="107" y="347" fill="#9ca3af" font-size="13" text-anchor="middle">Amount (XAF)</text>
  <rect x="195" y="322" width="177" height="40" rx="10" fill="white" filter="url(#shadow)"/>
  <text x="283" y="347" fill="#111827" font-size="13" font-weight="600" text-anchor="middle">Number of Units</text>

  <!-- Units Input -->
  <text x="20" y="390" fill="#374151" font-size="13" font-weight="600">Number of Units</text>
  <rect x="16" y="400" width="358" height="62" rx="12" fill="white" stroke="#1a56db" stroke-width="2" filter="url(#shadow)"/>
  <!-- Minus button -->
  <rect x="28" y="416" width="36" height="30" rx="8" fill="#e5e7eb"/>
  <text x="46" y="436" fill="#374151" font-size="22" font-weight="700" text-anchor="middle">−</text>
  <!-- Unit value -->
  <text x="195" y="440" fill="#111827" font-size="28" font-weight="700" text-anchor="middle">10</text>
  <text x="195" y="456" fill="#9ca3af" font-size="11" text-anchor="middle">units</text>
  <!-- Plus button -->
  <rect x="326" y="416" width="36" height="30" rx="8" fill="#1a56db"/>
  <text x="344" y="436" fill="white" font-size="22" font-weight="700" text-anchor="middle">+</text>
  <line x1="80" y1="458" x2="310" y2="458" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Quick unit shortcuts -->
  <text x="20" y="490" fill="#6b7280" font-size="12">Quick select</text>
  <rect x="16" y="498" width="56" height="32" rx="10" fill="#dbeafe"/>
  <text x="44" y="518" fill="#1e40af" font-size="12" font-weight="600" text-anchor="middle">1</text>
  <rect x="80" y="498" width="56" height="32" rx="10" fill="#dbeafe"/>
  <text x="108" y="518" fill="#1e40af" font-size="12" font-weight="600" text-anchor="middle">5</text>
  <rect x="144" y="498" width="56" height="32" rx="10" fill="#1a56db"/>
  <text x="172" y="518" fill="white" font-size="12" font-weight="600" text-anchor="middle">10</text>
  <rect x="208" y="498" width="56" height="32" rx="10" fill="#dbeafe"/>
  <text x="236" y="518" fill="#1e40af" font-size="12" font-weight="600" text-anchor="middle">25</text>
  <rect x="272" y="498" width="56" height="32" rx="10" fill="#dbeafe"/>
  <text x="300" y="518" fill="#1e40af" font-size="12" font-weight="600" text-anchor="middle">50</text>
  <rect x="336" y="498" width="42" height="32" rx="10" fill="#dbeafe"/>
  <text x="357" y="518" fill="#1e40af" font-size="12" font-weight="600" text-anchor="middle">100</text>

  <!-- Unit availability info -->
  <rect x="16" y="542" width="358" height="36" rx="10" fill="#f0fdf4"/>
  <text x="32" y="565" fill="#15803d" font-size="12">✓  3,450,000 units available in market · Max order: 10,000 units</text>

  <!-- Order Estimate -->
  <rect x="16" y="590" width="358" height="130" rx="14" fill="white" filter="url(#shadow)"/>
  <text x="32" y="614" fill="#111827" font-size="14" font-weight="600">Order Estimate</text>
  <line x1="32" y1="624" x2="358" y2="624" stroke="#f3f4f6" stroke-width="1"/>
  <text x="32" y="648" fill="#6b7280" font-size="13">Units to buy</text>
  <text x="358" y="648" fill="#111827" font-size="14" font-weight="700" text-anchor="end">10 units</text>
  <line x1="32" y1="658" x2="358" y2="658" stroke="#f3f4f6" stroke-width="1"/>
  <text x="32" y="682" fill="#6b7280" font-size="13">Price per unit (Ask)</text>
  <text x="358" y="682" fill="#111827" font-size="13" text-anchor="end">5,200 XAF</text>
  <line x1="32" y1="692" x2="358" y2="692" stroke="#f3f4f6" stroke-width="1"/>
  <text x="32" y="716" fill="#6b7280" font-size="13">Trading fee (0.5%)</text>
  <text x="358" y="716" fill="#ef4444" font-size="13" text-anchor="end">-260 XAF</text>

  <!-- Total -->
  <rect x="16" y="730" width="358" height="48" rx="12" fill="#f0fdf4"/>
  <text x="32" y="759" fill="#15803d" font-size="14" font-weight="600">Total to pay</text>
  <text x="358" y="759" fill="#15803d" font-size="18" font-weight="700" text-anchor="end">52,260 XAF</text>

  <!-- Balance check -->
  <text x="195" y="793" fill="#9ca3af" font-size="12" text-anchor="middle">Remaining balance after purchase: 797,740 XAF</text>

  <!-- Continue Button -->
  <rect x="16" y="760" width="358" height="52" rx="14" fill="#1a56db" filter="url(#shadow)"/>
  <text x="195" y="791" fill="white" font-size="16" font-weight="700" text-anchor="middle">Continue →</text>

  <!-- Bottom Nav -->
  <rect x="0" y="796" width="390" height="48" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <text x="48" y="826" fill="#9ca3af" font-size="10" text-anchor="middle">🏠 Home</text>
  <text x="146" y="826" fill="#1a56db" font-size="10" text-anchor="middle" font-weight="600">📊 Market</text>
  <text x="244" y="826" fill="#9ca3af" font-size="10" text-anchor="middle">💼 Portfolio</text>
  <text x="342" y="826" fill="#9ca3af" font-size="10" text-anchor="middle">📋 History</text>
</svg>
