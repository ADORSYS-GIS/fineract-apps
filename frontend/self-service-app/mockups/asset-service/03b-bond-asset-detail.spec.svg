<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 960" width="820" height="960">
  <defs>
    <style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }</style>
  </defs>

  <!-- Left: mockup -->
  <image href="./03b-bond-asset-detail.svg" x="0" y="0" width="390" height="960"/>

  <!-- Divider -->
  <line x1="397" y1="0" x2="397" y2="960" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Annotation panel -->
  <rect x="397" y="0" width="423" height="960" fill="#f8fafc"/>

  <!-- Title -->
  <text x="408" y="26" fill="#111827" font-size="13" font-weight="700">03b · Bond Asset Detail  (OTA Coupon Bond)</text>

  <!-- Endpoint -->
  <rect x="406" y="31" width="254" height="15" rx="3" fill="#ecfdf5"/>
  <text x="410" y="42" font-size="10" font-family="monospace"><tspan fill="#065f46" font-weight="700">GET</tspan><tspan fill="#1e40af"> /assets/{id}</tspan></text>
  <text x="408" y="57" fill="#64748b" font-size="9">Response: AssetPublicDetailResponse  (bond fields populated)</text>

  <!-- Section: Asset Header Card -->
  <line x1="406" y1="72" x2="816" y2="72" stroke="#e2e8f0" stroke-width="1"/>
  <text x="408" y="84" fill="#1e3a5f" font-size="11" font-weight="700">Asset Header Card</text>
  <text x="410" y="100" fill="#64748b" font-size="10">Bond name</text>
  <text x="814" y="100" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">AssetPublicDetailResponse.name</text>
  <text x="410" y="114" fill="#64748b" font-size="10">ISIN code</text>
  <text x="814" y="114" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">.isinCode</text>
  <text x="410" y="128" fill="#64748b" font-size="10">Status badge</text>
  <text x="814" y="128" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">.status</text>
  <text x="410" y="142" fill="#64748b" font-size="10">Issuer name</text>
  <text x="814" y="142" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">.issuerName</text>

  <!-- Section: Dirty Price Block -->
  <line x1="406" y1="159" x2="816" y2="159" stroke="#e2e8f0" stroke-width="1"/>
  <text x="408" y="171" fill="#1e3a5f" font-size="11" font-weight="700">Price Block  (dirty = clean + accrued interest)</text>
  <text x="410" y="187" fill="#64748b" font-size="10">Clean price (Ask)</text>
  <text x="814" y="187" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">.askPrice</text>
  <text x="410" y="201" fill="#64748b" font-size="10">Accrued interest (per unit)</text>
  <text x="814" y="201" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">computed client-side (see note)</text>
  <text x="410" y="215" fill="#64748b" font-size="10">Dirty price (Buy at) = clean + accrued</text>
  <text x="814" y="215" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">computed: askPrice + accrued</text>
  <text x="410" y="229" fill="#64748b" font-size="10">Bid price (Sell at)</text>
  <text x="814" y="229" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">.bidPrice</text>
  <text x="410" y="243" fill="#64748b" font-size="10">Day High / Low</text>
  <text x="814" y="243" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">.dayHigh / .dayLow</text>

  <!-- Section: Bond Details Card -->
  <line x1="406" y1="260" x2="816" y2="260" stroke="#e2e8f0" stroke-width="1"/>
  <text x="408" y="272" fill="#1e3a5f" font-size="11" font-weight="700">Bond Details Card</text>
  <text x="410" y="288" fill="#64748b" font-size="10">Interest rate (coupon %)</text>
  <text x="814" y="288" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">.interestRate</text>
  <text x="410" y="302" fill="#64748b" font-size="10">Face value per unit</text>
  <text x="814" y="302" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">BondBenefitProjection.faceValue</text>
  <text x="410" y="316" fill="#b45309" font-size="9">  (from GET /portfolio/positions/{assetId} → PositionResponse.bondBenefit)</text>
  <text x="410" y="330" fill="#64748b" font-size="10">Maturity date</text>
  <text x="814" y="330" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">.maturityDate</text>
  <text x="410" y="344" fill="#64748b" font-size="10">Coupon frequency ("Semi-annual")</text>
  <text x="814" y="344" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">.couponFrequencyMonths</text>
  <text x="410" y="358" fill="#64748b" font-size="10">Next coupon date</text>
  <text x="814" y="358" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">.nextCouponDate</text>
  <text x="410" y="372" fill="#64748b" font-size="10">ISIN code</text>
  <text x="814" y="372" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">.isinCode</text>

  <!-- Section: Accrued Interest Banner -->
  <line x1="406" y1="389" x2="816" y2="389" stroke="#e2e8f0" stroke-width="1"/>
  <text x="408" y="401" fill="#1e3a5f" font-size="11" font-weight="700">Accrued Interest Banner  (computed client-side)</text>
  <text x="410" y="417" fill="#64748b" font-size="10">Days since last coupon</text>
  <text x="814" y="417" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">today - lastCouponDate</text>
  <text x="410" y="431" fill="#64748b" font-size="10">Daily accrual rate</text>
  <text x="814" y="431" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">.interestRate × faceValue / 365</text>
  <text x="410" y="445" fill="#b45309" font-size="9">  ACT/365 convention; last coupon = nextCouponDate - couponFrequencyMonths</text>

  <!-- Section: Coupon Forecast Table -->
  <line x1="406" y1="462" x2="816" y2="462" stroke="#e2e8f0" stroke-width="1"/>
  <text x="408" y="474" fill="#1e3a5f" font-size="11" font-weight="700">Coupon Forecast Table  (next 3 coupons)</text>
  <text x="410" y="490" fill="#64748b" font-size="10">Coupon date (rows)</text>
  <text x="814" y="490" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">nextCouponDate + n × couponFrequencyMonths</text>
  <text x="410" y="504" fill="#64748b" font-size="10">Coupon per unit</text>
  <text x="814" y="504" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">.couponAmountPerUnit</text>
  <text x="410" y="518" fill="#64748b" font-size="10">Total if held (units × couponPerUnit)</text>
  <text x="814" y="518" fill="#7c3aed" font-size="9" font-family="monospace" text-anchor="end">PositionResponse.totalUnits × couponAmountPerUnit</text>

  <!-- Notes -->
  <line x1="406" y1="535" x2="816" y2="535" stroke="#e2e8f0" stroke-width="1"/>
  <text x="408" y="547" fill="#1e3a5f" font-size="11" font-weight="700">Notes</text>
  <text x="410" y="561" fill="#b45309" font-size="9">ⓘ Accrued interest computed client-side using ACT/365: (daysSinceLastCoupon / 365)</text>
  <text x="410" y="574" fill="#b45309" font-size="9">  × faceValue × interestRate. lastCouponDate = nextCouponDate − couponFreqMonths.</text>
  <text x="410" y="587" fill="#b45309" font-size="9">ⓘ BTA (discount bond, no coupons): interestRate=0; couponAmountPerUnit=0.</text>
  <text x="410" y="600" fill="#b45309" font-size="9">ⓘ "Buy" navigates to screen 05b (bond buy review); uses same /trades/quote endpoint.</text>
</svg>
