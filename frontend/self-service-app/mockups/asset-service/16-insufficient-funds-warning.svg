<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 960" width="390" height="960">
  <defs>
    <style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }</style>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#00000018"/></filter>
  </defs>

  <!-- Background -->
  <rect width="390" height="960" fill="#f3f4f6"/>

  <!-- Status Bar -->
  <rect width="390" height="44" fill="#1a56db"/>
  <text x="20" y="28" fill="white" font-size="13" font-weight="600">9:41</text>
  <text x="340" y="28" fill="white" font-size="11">▐▐▐ 🔋</text>

  <!-- Header -->
  <rect width="390" height="76" y="44" fill="#1a56db"/>
  <text x="36" y="90" fill="white" font-size="20">←</text>
  <text x="195" y="90" fill="white" font-size="18" font-weight="700" text-anchor="middle">Review Order</text>

  <!-- Step Progress Bar -->
  <rect x="16" y="132" width="358" height="6" rx="3" fill="#e5e7eb"/>
  <rect x="16" y="132" width="239" height="6" rx="3" fill="#1a56db"/>
  <text x="16" y="154" fill="#1a56db" font-size="12" font-weight="600">Step 2 of 3 · Review &amp; Confirm</text>

  <!-- INSUFFICIENT FUNDS — feasible=false banner -->
  <rect x="16" y="166" width="358" height="70" rx="12" fill="#fef2f2"/>
  <text x="32" y="186" fill="#dc2626" font-size="14" font-weight="700">⛔  Insufficient Funds</text>
  <text x="32" y="204" fill="#b91c1c" font-size="12">Required: 52,342 XAF   ·   Available: 30,000 XAF</text>
  <text x="32" y="220" fill="#b91c1c" font-size="12" font-weight="600">Shortfall: 22,342 XAF</text>

  <!-- Order Summary Card (read-only, slightly muted) -->
  <rect x="16" y="246" width="358" height="370" rx="14" fill="white" filter="url(#shadow)"/>
  <text x="32" y="274" fill="#111827" font-size="15" font-weight="700">Order Summary</text>

  <!-- Asset row -->
  <line x1="32" y1="284" x2="358" y2="284" stroke="#f3f4f6" stroke-width="1"/>
  <circle cx="48" cy="308" r="16" fill="#fef3c7"/>
  <text x="48" y="314" fill="#d97706" font-size="14" text-anchor="middle">🏠</text>
  <text x="72" y="303" fill="#6b7280" font-size="12">Asset</text>
  <text x="72" y="319" fill="#111827" font-size="14" font-weight="600">Immo Plus (IMMO)</text>
  <text x="358" y="311" fill="#6b7280" font-size="12" text-anchor="end">Real Estate</text>

  <line x1="32" y1="334" x2="358" y2="334" stroke="#f3f4f6" stroke-width="1"/>
  <text x="32" y="354" fill="#6b7280" font-size="13">Order Type</text>
  <rect x="282" y="342" width="70" height="22" rx="11" fill="#dcfce7"/>
  <text x="317" y="357" fill="#16a34a" font-size="12" font-weight="600" text-anchor="middle">📈 BUY</text>

  <line x1="32" y1="370" x2="358" y2="370" stroke="#f3f4f6" stroke-width="1"/>
  <text x="32" y="390" fill="#6b7280" font-size="13">Units to buy</text>
  <text x="358" y="390" fill="#111827" font-size="14" font-weight="700" text-anchor="end">10 units</text>

  <line x1="32" y1="406" x2="358" y2="406" stroke="#f3f4f6" stroke-width="1"/>
  <text x="32" y="426" fill="#6b7280" font-size="13">Price per unit</text>
  <text x="358" y="426" fill="#111827" font-size="14" text-anchor="end">5,200 XAF</text>

  <line x1="32" y1="442" x2="358" y2="442" stroke="#f3f4f6" stroke-width="1"/>
  <text x="32" y="462" fill="#6b7280" font-size="13">Gross amount</text>
  <text x="358" y="462" fill="#111827" font-size="14" text-anchor="end">52,000 XAF</text>

  <line x1="32" y1="478" x2="358" y2="478" stroke="#f3f4f6" stroke-width="1"/>
  <text x="32" y="498" fill="#6b7280" font-size="13">Trading fee (0.3%)</text>
  <text x="358" y="498" fill="#ef4444" font-size="13" text-anchor="end">+156 XAF</text>

  <line x1="32" y1="514" x2="358" y2="514" stroke="#f3f4f6" stroke-width="1"/>
  <text x="32" y="534" fill="#6b7280" font-size="13">LP spread (0.3%)</text>
  <text x="358" y="534" fill="#ef4444" font-size="13" text-anchor="end">+156 XAF</text>

  <line x1="32" y1="550" x2="358" y2="550" stroke="#f3f4f6" stroke-width="1"/>
  <text x="32" y="570" fill="#6b7280" font-size="13">TVA (19.25% on fee)</text>
  <text x="358" y="570" fill="#ef4444" font-size="13" text-anchor="end">+30 XAF</text>

  <!-- Total divider -->
  <line x1="16" y1="586" x2="374" y2="586" stroke="#e5e7eb" stroke-width="2"/>
  <text x="32" y="608" fill="#111827" font-size="15" font-weight="700">Total</text>
  <text x="358" y="608" fill="#1a56db" font-size="20" font-weight="700" text-anchor="end">52,342 XAF</text>

  <!-- Balance section — RED (insufficient) -->
  <rect x="16" y="622" width="358" height="44" rx="10" fill="#fef2f2"/>
  <text x="32" y="640" fill="#dc2626" font-size="13" font-weight="600">✗  Insufficient balance</text>
  <text x="358" y="640" fill="#dc2626" font-size="13" font-weight="600" text-anchor="end">30,000 XAF available</text>
  <text x="32" y="657" fill="#9ca3af" font-size="11">Need 52,342 XAF — add at least 22,342 XAF more</text>

  <!-- Disabled Confirm Button -->
  <rect x="16" y="676" width="358" height="52" rx="14" fill="#d1d5db"/>
  <text x="195" y="707" fill="#9ca3af" font-size="16" font-weight="700" text-anchor="middle">Add funds to continue</text>

  <!-- Deposit CTA — primary action when feasible=false -->
  <rect x="16" y="740" width="358" height="52" rx="14" fill="#1a56db" filter="url(#shadow)"/>
  <text x="195" y="771" fill="white" font-size="16" font-weight="700" text-anchor="middle">+ Deposit Funds</text>

  <!-- Reduce amount hint -->
  <text x="195" y="808" fill="#6b7280" font-size="13" text-anchor="middle">Or go back and reduce your order amount</text>

  <!-- Go Back -->
  <text x="195" y="840" fill="#1a56db" font-size="14" text-anchor="middle">← Go Back</text>

  <!-- Bottom Nav -->
  <rect x="0" y="912" width="390" height="48" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <text x="48" y="942" fill="#9ca3af" font-size="10" text-anchor="middle">🏠 Home</text>
  <text x="146" y="942" fill="#1a56db" font-size="10" text-anchor="middle" font-weight="600">📊 Market</text>
  <text x="244" y="942" fill="#9ca3af" font-size="10" text-anchor="middle">💼 Portfolio</text>
  <text x="342" y="942" fill="#9ca3af" font-size="10" text-anchor="middle">📋 History</text>
</svg>
