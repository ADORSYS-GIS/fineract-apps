name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
    types: [opened, synchronize, reopened]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Fetch all history so we can compare with main
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build affected projects
        run: |
          if [ -n "${{ github.base_ref }}" ]; then
            pnpm --filter="...[origin/${{ github.base_ref }}]" run build
          else
            pnpm -r build
          fi

      - name: Lint affected projects
        run: |
          if [ -n "${{ github.base_ref }}" ]; then
            pnpm --filter="...[origin/${{ github.base_ref }}]" run lint --if-present
          else
            pnpm -r lint --if-present
          fi

      - name: Run Biome for the whole repo
        run: pnpm biome ci .