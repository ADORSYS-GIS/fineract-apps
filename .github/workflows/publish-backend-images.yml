name: Publish Backend Docker Images

on:
  push:
    branches:
      - develop
      - main
      - test/ci-optimization
    paths:
      - 'backend/**'
      - '.github/workflows/publish-backend-images.yml'
  workflow_dispatch:
    inputs:
      services:
        description: 'Services to build (comma-separated: asset-service,customer-self-service,payment-gateway-service,user-sync-service or "all")'
        required: false
        default: 'all'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  determine-services:
    name: Determine Services to Build
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set-services.outputs.services }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set services matrix
        id: set-services
        run: |
          # workflow_dispatch: honour manual input unchanged
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            INPUT="${{ github.event.inputs.services }}"
            if [ "$INPUT" == "all" ] || [ -z "$INPUT" ]; then
              echo 'services=["asset-service","customer-self-service","payment-gateway-service","user-sync-service"]' >> $GITHUB_OUTPUT
            else
              SERVICES=$(echo "$INPUT" | jq -Rc 'split(",") | map(. | gsub(" "; ""))')
              echo "services=$SERVICES" >> $GITHUB_OUTPUT
            fi
            exit 0
          fi

          # push event: git diff-based detection
          BEFORE="${{ github.event.before }}"
          SHA="${{ github.sha }}"

          # Handle first push to a branch (before is all zeros)
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          else
            CHANGED=$(git diff --name-only "$BEFORE" "$SHA" 2>/dev/null || echo "")
          fi

          echo "Changed files:"
          echo "$CHANGED"

          # Safety net: if the workflow file itself changed, rebuild all
          if echo "$CHANGED" | grep -q "^\.github/workflows/publish-backend-images\.yml"; then
            echo "Workflow file changed — rebuilding all services"
            echo 'services=["asset-service","customer-self-service","payment-gateway-service","user-sync-service"]' >> $GITHUB_OUTPUT
            exit 0
          fi

          SERVICES=()
          for service in "asset-service" "customer-self-service" "payment-gateway-service" "user-sync-service"; do
            if echo "$CHANGED" | grep -q "^backend/$service/"; then
              SERVICES+=("\"$service\"")
              echo "Detected change in: $service"
            fi
          done

          if [ ${#SERVICES[@]} -eq 0 ]; then
            echo "No service directories changed — skipping builds"
            echo 'services=[]' >> $GITHUB_OUTPUT
          else
            echo "services=[$(IFS=,; echo "${SERVICES[*]}")]" >> $GITHUB_OUTPUT
          fi

  build-and-push:
    name: Build and Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: determine-services
    if: needs.determine-services.outputs.services != '[]'

    strategy:
      matrix:
        service: ${{ fromJson(needs.determine-services.outputs.services) }}
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          # Extract branch name
          BRANCH=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

          # Sanitize branch name for use as Docker tag (no slashes allowed)
          SAFE_BRANCH=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9._-]/-/g')
          echo "safe_branch=$SAFE_BRANCH" >> $GITHUB_OUTPUT

          # Extract git hashes
          SHORT_SHA=$(git rev-parse --short HEAD)
          LONG_SHA=$(git rev-parse HEAD)
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "long_sha=$LONG_SHA" >> $GITHUB_OUTPUT

      - name: Determine Context Directory
        id: context
        run: |
          SERVICE="${{ matrix.service }}"
          DIR="backend/$SERVICE"
          echo "dir=$DIR" >> $GITHUB_OUTPUT
          echo "Building context: $DIR"

      - name: Build and push ${{ matrix.service }} image
        if: github.ref != 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.context.outputs.dir }}
          file: ${{ steps.context.outputs.dir }}/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/adorsys-gis/fineract-apps/${{ matrix.service }}:${{ steps.meta.outputs.short_sha }}
            ${{ env.REGISTRY }}/adorsys-gis/fineract-apps/${{ matrix.service }}:${{ steps.meta.outputs.safe_branch }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.meta.outputs.long_sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Promote develop image to main
        if: github.ref == 'refs/heads/main'
        run: |
          IMAGE="${{ env.REGISTRY }}/adorsys-gis/fineract-apps/${{ matrix.service }}"
          docker pull "$IMAGE:develop"
          docker tag "$IMAGE:develop" "$IMAGE:main"
          docker tag "$IMAGE:develop" "$IMAGE:${{ steps.meta.outputs.short_sha }}"
          docker push "$IMAGE:main"
          docker push "$IMAGE:${{ steps.meta.outputs.short_sha }}"
          echo "Promoted $IMAGE:develop → main + ${{ steps.meta.outputs.short_sha }}"

      - name: Generate build summary
        run: |
          BRANCH="${{ steps.meta.outputs.branch }}"
          if [ "$BRANCH" == "main" ]; then
            ACTION="Promoted (develop → main)"
          else
            ACTION="Built from source"
          fi
          echo "### ${{ matrix.service }} Image Published ($ACTION)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry**: \`${{ env.REGISTRY }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Repository**: \`adorsys-gis/fineract-apps/${{ matrix.service }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**SHA**: \`${{ steps.meta.outputs.short_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pull Command**:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/adorsys-gis/fineract-apps/${{ matrix.service }}:${{ steps.meta.outputs.short_sha }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  trigger-gitops-update:
    name: Trigger GitOps Update
    needs: [determine-services, build-and-push]
    if: (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main') && needs.determine-services.outputs.services != '[]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract metadata
        id: meta
        run: |
          BRANCH=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Trigger GitOps repo update
        env:
          GH_TOKEN: ${{ secrets.GITOPS_PAT }}
        run: |
          BRANCH="${{ steps.meta.outputs.branch }}"
          TAG="${{ steps.meta.outputs.short_sha }}"
          SERVICES='${{ needs.determine-services.outputs.services }}'

          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/adorsys-gis/fineract-gitops/dispatches \
            -f event_type='update-backend-images' \
            -f client_payload[tag]="$TAG" \
            -f client_payload[branch]="$BRANCH" \
            -f client_payload[services]="$SERVICES"

          echo "### GitOps Update Triggered" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tag**: \`$TAG\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: \`$BRANCH\`" >> $GITHUB_STEP_SUMMARY
          echo "**Services**: \`$SERVICES\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "A PR will be created in the fineract-gitops repository to update image tags." >> $GITHUB_STEP_SUMMARY
